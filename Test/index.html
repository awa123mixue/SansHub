<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - 页面去火星了</title>
    
    <link rel="icon" type="image/x-icon" href="https://roblox.com/favicon.ico">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #311042 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #f8fafc;
            overflow: hidden;
            position: relative;
        }

        /* 背景装饰粒子效果 */
        body::before, body::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: rgba(99, 102, 241, 0.15);
            filter: blur(80px);
            z-index: 0;
        }
        body::before { top: 10%; left: 10%; }
        body::after { bottom: 10%; right: 10%; }

        /* 核心卡片容器 */
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 3.5rem 2rem;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 90%;
            z-index: 1;
            animation: fadeIn 0.8s ease-out;
        }

        /* 巨大的 404 数字 */
        .error-code {
            font-size: 8rem;
            font-weight: 900;
            line-height: 1;
            background: linear-gradient(45deg, #6366f1, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -2px;
            margin-bottom: 1rem;
            animation: pulse 3s infinite alternate;
        }

        /* 提示标题 */
        .error-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #f1f5f9;
        }

        /* 详细描述 */
        .error-message {
            font-size: 1rem;
            color: #94a3b8;
            line-height: 1.6;
            margin-bottom: 2.5rem;
        }

        /* 单个按钮居中布局 */
        .btn-group {
            display: flex;
            justify-content: center;
        }

        .btn-primary {
            display: inline-block;
            padding: 0.85rem 2.5rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 12px;
            text-decoration: none;
            color: #ffffff;
            background: #6366f1;
            box-shadow: 0 4px 14px rgba(99, 102, 241, 0.4);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .btn-primary:hover {
            background: #4f46e5;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.6);
        }

        /* 动画效果 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0% { filter: drop-shadow(0 0 15px rgba(99, 102, 241, 0.2)); }
            100% { filter: drop-shadow(0 0 30px rgba(236, 72, 153, 0.4)); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="error-code">404</div>
        
        <h1 class="error-title">抱歉，页面不见了</h1>
        <p class="error-message">您访问的链接可能已经失效、被删除，或者由于输入错误导致无法访问。不如先返回首页看看吧？</p>
        
        <div class="btn-group">
            <a href="https://awa123mixue.github.io/SansHub" class="btn-primary">返回首页</a>
        </div>
    </div>

</body>
</html>
