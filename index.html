<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>粉龙的大转盘</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0b0c10; color: #e2e8f0; padding: 15px; display: flex; justify-content: center; min-height: 100vh; overflow-x: hidden; }
        .container { display: flex; max-width: 1200px; width: 100%; gap: 20px; flex-wrap: wrap; margin: auto 0; z-index: 1; }
        
        .panel { background: #13141c; border: 1px solid #222430; border-radius: 12px; padding: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.8); width: 100%; }
        .left-panel { flex: 1; min-width: 0; display: flex; flex-direction: column; }
        .right-panel { flex: 2; min-width: 0; display: flex; flex-direction: column; gap: 20px; justify-content: center; }
        
        /* 移动端媒体查询：优先垂直排列 */
        @media (max-width: 850px) { 
            .container { flex-direction: column; margin: 0; } 
            .panel { padding: 15px; }
        }

        h2 { font-size: 1.05rem; margin-bottom: 15px; color: #f1c40f; border-left: 4px solid #f1c40f; padding-left: 8px; text-transform: uppercase; letter-spacing: 1px; }
        .form-group { margin-bottom: 20px; }
        
        /* 初始模式选择舞台 */
        .mode-selection-stage { display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px; background: #1a1c26; padding: 20px; border-radius: 8px; border: 1px dashed #3a3f58; }
        
        .btn { display: block; width: 100%; background: linear-gradient(135deg, #f1c40f, #d35400); color: #000; border: none; padding: 14px; border-radius: 6px; cursor: pointer; font-weight: 800; font-size: 0.95rem; text-transform: uppercase; box-shadow: 0 4px 15px rgba(241, 196, 15, 0.15); transition: all 0.2s; text-align: center; }
        .btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(241, 196, 15, 0.35); }
        .btn:disabled { background: #1e212b; color: #4e5768; cursor: not-allowed; transform: none; box-shadow: none; }
        
        .btn-guest { background: linear-gradient(135deg, #2ecc71, #27ae60); color: #fff; box-shadow: 0 4px 15px rgba(46, 204, 113, 0.2); }
        .btn-guest:hover { box-shadow: 0 6px 20px rgba(46, 204, 113, 0.4); }
        .btn-admin { background: linear-gradient(135deg, #9b59b6, #8e44ad); color: #fff; box-shadow: 0 4px 15px rgba(155, 89, 182, 0.2); }
        .btn-admin:hover { box-shadow: 0 6px 20px rgba(155, 89, 182, 0.4); }
        
        /* 刷新按钮样式 */
        .btn-refresh { background: linear-gradient(135deg, #34495e, #2c3e50); color: #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.2); margin-top: 10px; padding: 10px; font-size: 0.85rem; }
        .btn-refresh:hover { background: linear-gradient(135deg, #455a64, #34495e); }

        .btn-triple { background: linear-gradient(135deg, #2980b9, #1f4068); color: white; box-shadow: 0 4px 15px rgba(41, 128, 185, 0.15); margin-bottom: 0; }
        .btn-triple:hover { box-shadow: 0 6px 20px rgba(41, 128, 185, 0.35); }
        .btn-group { display: flex; gap: 10px; margin-bottom: 15px; }

        input[type="password"] { width: 100%; padding: 12px 16px; background: #06070a; border: 1px solid #232736; border-radius: 6px; color: #fff; outline: none; font-size: 1rem; }
        input[type="password"]:focus { border-color: #f1c40f; }

        .main-game-content { display: none; } 

        .prize-box { background: #06070a; border-radius: 8px; padding: 15px; margin-bottom: 15px; border: 1px solid #1a1c26; display: none; }
        .stats { font-size: 0.8rem; color: #7f8c8d; margin-bottom: 10px; display: flex; flex-direction: column; gap: 4px; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(75px, 1fr)); gap: 6px; max-height: 180px; overflow-y: auto; }
        .grid-item { padding: 6px; text-align: center; border-radius: 4px; font-size: 0.72rem; font-weight: bold; border: 1px solid transparent; }
        
        .item-A { background: rgba(231, 76, 60, 0.15); color: #ff4757; border-color: #e74c3c; }
        .item-B { background: rgba(241, 196, 15, 0.15); color: #ffa502; border-color: #f1c40f; }
        .item-C { background: rgba(155, 89, 182, 0.15); color: #e056fd; border-color: #9b59b6; }
        .item-empty { background: #191b24; color: #57606f; border-color: #2f3542; }

        .history-list { max-height: 120px; overflow-y: auto; background: #06070a; padding: 12px; border-radius: 8px; font-size: 0.82rem; border: 1px solid #1a1c26; }
        .history-item { padding: 6px 0; border-bottom: 1px dashed #1a1c26; color: #a4b0be; }
        
        .txt-A { color: #ff4757; font-weight: bold; }
        .txt-B { color: #ffa502; font-weight: bold; }
        .txt-C { color: #e056fd; font-weight: bold; }

        /* ================= 滚动轴核心配置 ================= */
        .case-roulette-container { display: flex; flex-direction: column; gap: 15px; background: #06070a; padding: 20px 10px; border-radius: 8px; border: 1px solid #1a1c26; width: 100%; }
        .roulette-row { position: relative; width: 100%; height: 110px; background: #10121a; overflow: hidden; border: 2px solid #222430; border-radius: 4px; display: none; }
        .roulette-row.active { display: block; }
        
        .pointer-line { position: absolute; top: 0; left: 50%; width: 4px; height: 100%; background: #f1c40f; transform: translateX(-50%); z-index: 10; box-shadow: 0 0 15px #f1c40f; }
        .roulette-track { display: flex; position: absolute; left: 0; top: 0; height: 100%; width: max-content; transform: translate3d(0, 0, 0); }
        
        .card-item { width: 110px; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.72rem; font-weight: bold; text-align: center; border-right: 2px solid #06070a; position: relative; padding: 5px; flex-shrink: 0; transition: all 0.3s; }
        .card-item::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 4px; }
        
        .card-A { background: linear-gradient(to bottom, #2c1a1d, #44181d); color: #ff4757; } .card-A::after { background: #ff4757; }
        .card-B { background: linear-gradient(to bottom, #2c251a, #443418); color: #ffa502; } .card-B::after { background: #ffa502; }
        .card-C { background: linear-gradient(to bottom, #231a2c, #331844); color: #e056fd; } .card-C::after { background: #e056fd; }
        .card-empty { background: linear-gradient(to bottom, #141722, #1b1e2b); color: #57606f; } .card-empty::after { background: #57606f; }
        .card-icon { font-size: 1.4rem; margin-bottom: 6px; }
        .card-item.winner-highlight { transform: scale(1.05); z-index: 5; filter: brightness(1.5); box-shadow: inset 0 0 15px rgba(255,255,255,0.4); border: 1px solid currentColor !important; }

        /* ================= 全屏撕裂舞台 ================= */
        .tear-stage { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1000; display: none; overflow: hidden; background: #000; }
        .tear-bottom-url-bg { position: absolute; width: 100%; height: 100%; background-size: cover; background-position: center; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1; }
        .tear-winner-info { z-index: 2; text-align: center; background: rgba(0,0,0,0.6); padding: 15px 30px; border-radius: 4px; border-left: 5px solid currentColor; backdrop-filter: blur(5px); transform: translateY(50px); opacity: 0; transition: all 0.5s 0.4s ease-out; max-width: 90%; }
        .tear-stage.ripped .tear-winner-info { transform: translateY(0); opacity: 1; }
        .tear-winner-info h1 { font-size: 2rem; font-weight: 900; letter-spacing: 2px; margin-bottom: 5px; word-break: break-all; }
        .tear-winner-info p { font-size: 1rem; color: #fff; letter-spacing: 4px; text-transform: uppercase; font-weight: bold; }

        @media (min-width: 768px) {
            .tear-winner-info h1 { font-size: 3rem; }
            .tear-winner-info p { font-size: 1.2rem; letter-spacing: 8px; }
        }

        .tear-paper-top, .tear-paper-bottom { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #2d144d 0%, #150727 100%); z-index: 5; transition: transform 0.65s cubic-bezier(0.25, 1, 0.5, 1); }
        .tear-paper-top { clip-path: polygon(0 0, 100% 0, 100% 20%, 0 80%); }
        .tear-paper-bottom { clip-path: polygon(0 80%, 100% 20%, 100% 100%, 0 100%); }

        .tear-stage.ripped .tear-paper-top { transform: translate(-80%, -80%); }
        .tear-stage.ripped .tear-paper-bottom { transform: translate(80%, 80%); }

        .tear-laser-line { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 6; pointer-events: none; background: linear-gradient(28deg, rgba(255,255,255,0) 48%, #e056fd 50%, #fff 51%, rgba(255,255,255,0) 53%); transition: all 0.5s ease-out; transform: scale(1); opacity: 1; }
        .tear-stage.ripped .tear-laser-line { transform: scale(1.5); opacity: 0; }
        .tear-click-next-tip { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 10; color: rgba(255,255,255,0.7); font-weight: bold; letter-spacing: 2px; font-size: 0.85rem; background: rgba(224, 86, 253, 0.2); border: 1px solid #e056fd; padding: 10px 20px; border-radius: 30px; pointer-events: none; animation: blink 1.5s infinite; display: none; white-space: nowrap; }
        .tear-stage.ripped .tear-click-next-tip { display: block; }

        /* ================= PUBG 最终综合结算大屏 ================= */
        .pubg-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(3, 3, 5, 0.95); z-index: 999; display: flex; flex-direction: column; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: opacity 0.4s cubic-bezier(0.25, 1, 0.5, 1); padding: 10px; }
        .pubg-overlay.show { opacity: 1; pointer-events: auto; }
        
        /* 移动端隐藏两侧装饰箭头，避免重叠遮挡 */
        .pubg-arrow-left, .pubg-arrow-right { position: absolute; width: 200px; height: 60px; font-size: 2.5rem; color: rgba(255, 255, 255, 0.2); display: none; align-items: center; justify-content: center; transition: all 0.4s cubic-bezier(0.1, 1.2, 0.1, 1); opacity: 0; font-style: italic; font-weight: 900; letter-spacing: -5px; }
        @media (min-width: 850px) {
            .pubg-arrow-left, .pubg-arrow-right { display: flex; }
            .pubg-arrow-left { left: -300px; } .pubg-arrow-right { right: -300px; }
            .pubg-overlay.animate-arrows .pubg-arrow-left { left: 50%; transform: translateX(-280px); opacity: 1; color: #f1c40f; text-shadow: 0 0 20px #f1c40f; }
            .pubg-overlay.animate-arrows .pubg-arrow-right { right: 50%; transform: translateX(280px); opacity: 1; color: #f1c40f; text-shadow: 0 0 20px #f1c40f; }
        }

        .pubg-banner { width: 100%; min-height: 180px; height: auto; padding: 20px 10px; background: linear-gradient(90deg, rgba(0,0,0,0) 0%, rgba(16,17,24,0.98) 15%, rgba(16,17,24,0.98) 85%, rgba(0,0,0,0) 100%); border-top: 2px solid #2c3144; border-bottom: 2px solid #2c3144; display: flex; flex-direction: column; align-items: center; justify-content: center; transform: scaleY(0); opacity: 0; transition: all 0.35s cubic-bezier(0.34, 1.4, 0.64, 1); position: relative; overflow: hidden; }
        .pubg-overlay.show-banner .pubg-banner { transform: scaleY(1); opacity: 1; }

        .pubg-title { font-size: 0.8rem; color: #8f96a3; font-weight: bold; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 15px; opacity: 0; transform: translateY(-10px); transition: all 0.3s 0.2s; text-align: center; }
        .pubg-overlay.show-banner .pubg-title { opacity: 1; transform: translateY(0); }

        .pubg-list { display: flex; gap: 15px; justify-content: center; align-items: center; width: 100%; flex-wrap: wrap; }
        .pubg-prize-item { display: flex; flex-direction: column; align-items: center; position: relative; padding: 8px 15px; border-radius: 6px; min-width: 90px; }
        
        .pubg-prize-item.glow-A { animation: pubg-pulse-A 1.8s infinite ease-in-out, pubg-pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.2) both; }
        .pubg-prize-item.glow-B { animation: pubg-pulse-B 1.8s infinite ease-in-out, pubg-pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.2) both; }
        .pubg-prize-item.glow-C { animation: pubg-pulse-C 1.8s infinite ease-in-out, pubg-pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.2) both; }
        .pubg-prize-item.glow-empty { animation: pubg-pop 0.4s ease both; opacity: 0.6; }

        @keyframes pubg-pop { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes pubg-pulse-A {
            0%, 100% { box-shadow: 0 0 15px rgba(255, 71, 87, 0.2); background: rgba(255, 71, 87, 0.04); border: 1px solid rgba(255, 71, 87, 0.3); }
            50% { box-shadow: 0 0 30px rgba(255, 71, 87, 0.6); background: rgba(255, 71, 87, 0.12); border: 1px solid rgba(255, 71, 87, 0.6); }
        }
        @keyframes pubg-pulse-B {
            0%, 100% { box-shadow: 0 0 15px rgba(241, 196, 15, 0.2); background: rgba(241, 196, 15, 0.04); border: 1px solid rgba(241, 196, 15, 0.3); }
            50% { box-shadow: 0 0 30px rgba(241, 196, 15, 0.7); background: rgba(241, 196, 15, 0.12); border: 1px solid rgba(241, 196, 15, 0.6); }
        }
        @keyframes pubg-pulse-C {
            0%, 100% { box-shadow: 0 0 15px rgba(155, 89, 182, 0.2); background: rgba(155, 89, 182, 0.04); border: 1px solid rgba(155, 89, 182, 0.3); }
            50% { box-shadow: 0 0 30px rgba(155, 89, 182, 0.7); background: rgba(155, 89, 182, 0.12); border: 1px solid rgba(155, 89, 182, 0.6); }
        }

        .pubg-item-tag { position: absolute; top: -8px; font-size: 0.6rem; padding: 1px 4px; border-radius: 3px; font-weight: 900; background: #000; color: #fff; border: 1px solid currentColor; white-space: nowrap; }
        .tag-A { color: #ff4757; } .tag-B { color: #ffa502; } .tag-C { color: #e056fd; }
        .pubg-item-icon { font-size: 1.8rem; margin-top: 4px; }
        .pubg-item-name { font-size: 1rem; font-weight: 900; color: #fff; margin-top: 6px; text-shadow: 0 2px 4px rgba(0,0,0,0.9); text-align: center; word-break: break-all; }
        
        .name-A { color: #ff4757; text-shadow: 0 0 10px rgba(255,71,87,0.5); }
        .name-B { color: #ffa502; text-shadow: 0 0 10px rgba(241,196,15,0.5); }
        .name-C { color: #e056fd; text-shadow: 0 0 10px rgba(155,89,182,0.5); }
        .name-empty { color: #57606f; }
        .pubg-close-tip { margin-top: 30px; color: #4e5768; font-size: 0.75rem; letter-spacing: 1px; animation: blink 1.8s infinite; opacity: 0; transition: opacity 0.3s 0.6s; cursor: pointer; background: rgba(255,255,255,0.02); padding: 8px 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.06); text-align: center; max-width: 90%; }
        .pubg-overlay.show-banner .pubg-close-tip { opacity: 1; }
        @keyframes blink { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <div class="left-panel panel">
        <div id="modeSelectBlock" class="mode-selection-stage">
            <h2>第一步：请选择进入模式</h2>
            <button class="btn btn-guest" onclick="selectGuestMode()">进入：普通抽奖模式</button>
            <button class="btn btn-admin" onclick="selectAdminMode()">进入：官方管理模式</button>
        </div>

        <div id="adminArea" style="display: none;">
            <h2>官方人员验证：</h2>
            <div style="background: #1a1c26; border: 1px dashed #3a3f58; padding: 15px; border-radius: 8px; margin-bottom: 20px;">
                <input type="password" id="adminPassword" placeholder="输入官方管理员密码解锁轮盘" oninput="verifyAdminPassword()">
            </div>
        </div>

        <h2 id="prizePoolTitle" style="display: none;">奖池库存与概率：</h2>
        <div class="prize-box" id="prizeBoxContainer">
            <div class="stats" id="statsArea"></div>
            <div class="grid-container" id="gridContainer"></div>
            <button class="btn btn-refresh" id="btnRefreshPool" onclick="resetPrizePool()">🔄 刷新/重置初始奖池</button>
        </div>

        <div id="historyBlock" class="main-game-content" style="margin-top: 15px;">
            <h2>滚动记录</h2>
            <div class="history-list" id="historyList">暂无抽取历史纪录</div>
        </div>
    </div>

    <div class="right-panel panel main-game-content" id="rightWheelPanel">
        <h2>滚动系统</h2>
        
        <div class="btn-group">
            <button class="btn" id="btnSingle" onclick="launchDraw(1)">抽取一次</button>
            <button class="btn btn-triple" id="btnTriple" onclick="launchDraw(3)">绝世三连</button>
        </div>

        <div class="case-roulette-container">
            <div class="roulette-row active" id="row0"><div class="pointer-line"></div><div class="roulette-track" id="track0"></div></div>
            <div class="roulette-row" id="row1"><div class="pointer-line"></div><div class="roulette-track" id="track1"></div></div>
            <div class="roulette-row" id="row2"><div class="pointer-line"></div><div class="roulette-track" id="track2"></div></div>
        </div>
    </div>
</div>

<div class="tear-stage" id="tearStage" onclick="handleTearStageClick()">
    <div class="tear-bottom-url-bg" id="tearBgImage">
        <div class="tear-winner-info" id="tearInfoCard">
            <p id="tearItemRarity">恭喜获得</p>
            <h1 id="tearItemName">Test</h1>
        </div>
    </div>
    <div class="tear-paper-top"></div>
    <div class="tear-laser-line"></div>
    <div class="tear-paper-bottom"></div>
    <div class="tear-click-next-tip" id="tearNextTip">点击屏幕继续</div>
</div>

<div class="pubg-overlay" id="pubgOverlay" onclick="closePubgOverlay()">
    <div class="pubg-arrow-left">>>>></div>
    <div class="pubg-arrow-right"><<<<</div>
    <div class="pubg-banner">
        <div class="pubg-title">本次抽奖清单 ITEMS WON</div>
        <div class="pubg-list" id="pubgPrizeList"></div>
    </div>
    <div class="pubg-close-tip">点击任意空白区域收下奖励并返回</div>
</div>

        { type: "empty", name: "谢谢惠顾", weight: 25 }, { type: "empty", name: "谢谢惠顾", weight: 25 },
        { type: "empty", name: "谢谢惠顾", weight: 25 }, { type: "empty", name: "谢谢惠顾", weight: 25 },
        { type: "empty", name: "谢谢惠顾", weight: 25 }, { type: "empty", name: "谢谢惠顾", weight: 25 },
        { type: "empty", name: "谢谢惠顾", weight: 25 }, { type: "empty", name: "谢谢惠顾", weight: 25 }
    ];

    let prizes = [];

    function init() {
        resetPrizePool(); 
        for(let i=0; i<3; i++) preBuildDOMTrack(i);
        
        // 监听视口改变，防止横竖屏切换时中奖位置对不齐
        window.addEventListener('resize', () => {
            if(!isRunning && cachedFinalWinners.length > 0) {
                // 如果当前没有在运行但有抽奖记录，修正轨道位置
                cachedFinalWinners.forEach(win => {
                    const track = document.getElementById(`track${win.rowId}`);
                    if(track && document.getElementById(`row${win.rowId}`).classList.contains('active')) {
                        const containerWidth = document.getElementById(`row${win.rowId}`).offsetWidth;
                        const targetLeft = (48 * itemWidth) + (itemWidth / 2);
                        track.style.transition = 'none';
                        track.style.transform = `translate3d(${-(targetLeft - (containerWidth / 2))}px, 0px, 0px)`;
                    }
                });
            }
        });
    }

    function resetPrizePool() {
        if (isRunning) return;
        prizes = JSON.parse(JSON.stringify(INITIAL_PRIZES_TEMPLATE)); 
        updateSnapshot();
    }

    function selectGuestMode() {
        isGuestMode = true;
        document.getElementById('adminArea').remove();
        document.getElementById('prizeBoxContainer').remove();
        document.getElementById('prizePoolTitle').remove();
        document.getElementById('historyBlock').remove();
        document.getElementById('modeSelectBlock').remove(); 
        document.getElementById('rightWheelPanel').style.display = 'flex';
    }

    function selectAdminMode() {
        isGuestMode = false;
        document.getElementById('modeSelectBlock').style.display = 'none'; 
        document.getElementById('adminArea').style.display = 'block';      
    }

    function verifyAdminPassword() {
        const inputPwd = document.getElementById('adminPassword').value;
        const prizeBox = document.getElementById('prizeBoxContainer');
        const prizeTitle = document.getElementById('prizePoolTitle');
        const mainContents = document.querySelectorAll('.main-game-content');
        
        if (inputPwd === CORRECT_PASSWORD) {
            prizeBox.style.display = 'block';
            prizeTitle.style.display = 'block';
            mainContents.forEach(el => el.style.display = 'flex');
            document.getElementById('adminArea').style.display = 'none'; 
        }
    }

    function updateSnapshot() {
        const statsEl = document.getElementById('statsArea');
        const gridEl = document.getElementById('gridContainer');
        if(!statsEl || !gridEl) return; 

        const countA = prizes.filter(p => p.type === "A").length;
        const countB = prizes.filter(p => p.type === "B").length;
        const countC = prizes.filter(p => p.type === "C").length;
        const countE = prizes.filter(p => p.type === "empty").length;
        
        statsEl.innerHTML = `
            <span style="color:#ff4757">[A级·红光] 豪华礼品: ${countA} 个</span>
            <span style="color:#ffa502">[B级·金光] 精选礼品: ${countB} 个</span>
            <span style="color:#e056fd">[C级·紫光] 基础礼品: ${countC} 个</span>
            <span style="color:#57606f">[谢谢惠顾] 常驻项: ${countE} 个</span>
        `;
        gridEl.innerHTML = prizes.map(p => `
            <div class="grid-item ${'item-' + p.type}">${p.type === 'empty' ? '✨' : '🎁'}<br>${p.name.slice(0,4)}</div>
        `).join('');
    }

    function getWinIndex(pool) {
        const totalWeight = pool.reduce((sum, p) => {
            if (isGuestMode && p.type === 'empty') return sum + 2; 
            return sum + p.weight;
        }, 0);

        let randomWeight = Math.random() * totalWeight;
        let weightSum = 0;
        
        for (let i = 0; i < pool.length; i++) {
            let currentWeight = pool[i].weight;
            if (isGuestMode && pool[i].type === 'empty') currentWeight = 2;
            
            weightSum += currentWeight;
            if (randomWeight <= weightSum) return i;
        }
        return pool.length - 1;
    }

    function preBuildDOMTrack(trackId) {
        const track = document.getElementById(`track${trackId}`);
        track.innerHTML = '';
        for (let i = 0; i < totalItemsInTrack; i++) {
            const card = document.createElement('div');
            card.className = `card-item card-empty`;
            card.id = `track-${trackId}-item-${i}`;
            card.innerHTML = `<div class="card-icon">✨</div><div class="text-node">谢谢惠顾</div>`;
            track.appendChild(card);
        }
    }

    function launchDraw(rowCount) {
        if (isRunning) return;
        if (!isGuestMode && prizes.length < rowCount) {
            alert(`⚠️ 库存不足以支撑 ${rowCount} 连抽！请点击左侧刷新奖池！`);
            return;
        }

        isRunning = true;
        document.getElementById('btnSingle').disabled = true;
        document.getElementById('btnTriple').disabled = true;
        const refreshBtn = document.getElementById('btnRefreshPool');
        if(refreshBtn) refreshBtn.disabled = true;

        let tempPool = [...prizes]; 
        cachedFinalWinners = []; 

        for (let i = 0; i < 3; i++) {
            document.getElementById(`row${i}`).className = i < rowCount ? "roulette-row active" : "roulette-row";
        }

        for (let r = 0; r < rowCount; r++) {
            const track = document.getElementById('track' + r);
            track.style.transition = 'none'; 
            track.style.transform = 'translate3d(0px, 0px, 0px)';
            for (let i = 0; i < totalItemsInTrack; i++) {
                document.getElementById(`track-${r}-item-${i}`).classList.remove('winner-highlight');
            }
            track.offsetHeight; 
        }

        for (let r = 0; r < rowCount; r++) {
            const winIndex = getWinIndex(tempPool);
            const winItem = tempPool[winIndex];
            
            cachedFinalWinners.push({ rowId: r, item: winItem, indexInPrizes: prizes.indexOf(winItem) });
            
            if(!isGuestMode) {
                tempPool.splice(winIndex, 1);
            }
            
            for (let i = 0; i < totalItemsInTrack; i++) {
                const card = document.getElementById(`track-${r}-item-${i}`);
                let currentItem = (i === 48) ? winItem : (prizes[Math.floor(Math.random() * prizes.length)] || {type:"empty", name:"谢谢惠顾"});

                card.className = `card-item card-${currentItem.type}`;
                card.querySelector('.card-icon').innerText = currentItem.type === 'empty' ? '✨' : '🎁';
                card.querySelector('.text-node').innerText = currentItem.name;
            }
        }

        setTimeout(() => {
            for (let r = 0; r < rowCount; r++) {
                const track = document.getElementById(`track${r}`);
                const containerWidth = document.getElementById(`row${r}`).offsetWidth;
                const targetLeft = (48 * itemWidth) + (itemWidth / 2);
                track.style.transition = 'transform 4.5s cubic-bezier(0.1, 0.85, 0.25, 1)';
                track.style.transform = `translate3d(${-(targetLeft - (containerWidth / 2))}px, 0px, 0px)`;
            }
        }, 30);

        setTimeout(() => {
            const historyList = document.getElementById('historyList');
            const timeStr = new Date().toLocaleTimeString();

            if (historyList && historyList.innerText === "暂无抽取历史纪录") historyList.innerHTML = '';
            specialTearQueue = [];

            if (!isGuestMode) {
                const sortedWinners = [...cachedFinalWinners].sort((a, b) => b.indexInPrizes - a.indexInPrizes);
                sortedWinners.forEach(win => {
                    if (win.indexInPrizes !== -1) prizes.splice(win.indexInPrizes, 1);
                });
            }

            cachedFinalWinners.forEach(win => {
                const targetCard = document.getElementById(`track-${win.rowId}-item-48`);
                if (targetCard) targetCard.classList.add('winner-highlight');
                
                if (historyList) {
                    historyList.innerHTML += `
                        <div class="history-item">
                            [${timeStr}] 轴${win.rowId+1} → <span class="txt-${win.item.type}">[${win.item.name}]</span>
                        </div>
                    `;
                }

                if (win.item.type === 'A' || win.item.type === 'B' || win.item.type === 'C') {
                    specialTearQueue.push(win.item);
                }
            });

            updateSnapshot();

            if (specialTearQueue.length > 0) {
                currentTearIndex = 0;
                presentNextTear();
            } else {
                showFinalPubgOverlay();
            }

        }, 4600);
    }

    function presentNextTear() {
        const item = specialTearQueue[currentTearIndex];
        const stage = document.getElementById('tearStage');
        
        stage.classList.remove('ripped');
        document.getElementById('tearInfoCard').style.color = item.type === 'A' ? '#ff4757' : (item.type === 'B' ? '#ffa502' : '#e056fd');
        document.getElementById('tearItemRarity').innerText = `🏆 恭喜获得 - ${item.type}级`;
        document.getElementById('tearItemName').innerText = item.name;
        
        document.getElementById('tearBgImage').style.backgroundImage = `url('${bgImages[item.type]}')`;
        stage.style.display = 'block';

        setTimeout(() => { stage.classList.add('ripped'); }, 150);
    }

    function handleTearStageClick() {
        const stage = document.getElementById('tearStage');
        if (!stage.classList.contains('ripped')) return;

        currentTearIndex++;
        if (currentTearIndex < specialTearQueue.length) {
            presentNextTear();
        } else {
            stage.style.display = 'none';
            showFinalPubgOverlay();
        }
    }

    function showFinalPubgOverlay() {
        let pubgItemsHtml = '';
        cachedFinalWinners.forEach(win => {
            const type = win.item.type;
            pubgItemsHtml += `
                <div class="pubg-prize-item glow-${type}" style="animation-delay: ${win.rowId * 0.15}s">
                    ${type !== 'empty' ? `<div class="pubg-item-tag tag-${type}">品级 ${type}</div>` : ''}
                    <div class="pubg-item-icon">${type === 'empty' ? '✨' : '🎁'}</div>
                    <div class="pubg-item-name name-${type}">${win.item.name}</div>
                </div>
            `;
        });

        const overlay = document.getElementById('pubgOverlay');
        document.getElementById('pubgPrizeList').innerHTML = pubgItemsHtml;
        
        overlay.classList.add('show');
        setTimeout(() => { overlay.classList.add('animate-arrows'); }, 100);
        setTimeout(() => { overlay.classList.add('show-banner'); }, 550);
    }

    function closePubgOverlay() {
        const overlay = document.getElementById('pubgOverlay');
        overlay.classList.remove('show', 'animate-arrows', 'show-banner');
        
        setTimeout(() => {
            isRunning = false;
            document.getElementById('btnSingle').disabled = false;
            document.getElementById('btnTriple').disabled = false;
            const refreshBtn = document.getElementById('btnRefreshPool');
            if(refreshBtn) refreshBtn.disabled = false; 
        }, 400);
    }

    init();
    
    // 禁用右键及调试逻辑保持不变
    document.oncontextmenu = function() { return false; };
    document.onselectstart = function() { return false; };
    document.onkeydown = function (e) {
        if (e.keyCode === 123 || 
            (e.ctrlKey && e.shiftKey && e.keyCode === 73) || 
            (e.ctrlKey && e.keyCode === 85)) { 
            return false;
        }
    };
</script>
</body>
