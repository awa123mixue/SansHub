<html lang="zh-CN"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SansHub</title>
    
    <link href="./SansHub_files/css2" rel="stylesheet">
    
    <style>
        /* 增加高级防选反蓝样式，全面保护文本内容 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none; /* 禁用苹果手机选中文本 */
            -moz-user-select: none;    /* 禁用火狐选中文本 */
            -ms-user-select: none;     /* 禁用IE选中文本 */
            user-select: none;         /* 禁用标准浏览器选中文本 */
        }

        html, body {
            width: 100%;
            height: 100vh;
            height: -webkit-fill-available;
            overflow: hidden; 
            background: #000000;
            font-family: 'Noto Sans SC', -apple-system, sans-serif;
            color: #e2e8f0;
        }

        /* ================= 背景跑马灯 ================= */
        .marquee-wrapper {
            position: fixed;
            top: 42%;
            left: 0;
            width: 100%;
            height: 56.25vw;
            max-height: 45vh;
            transform: translateY(-50%);
            z-index: 1;
            overflow: hidden;
            opacity: 0.28;
            pointer-events: none;
        }

        .marquee-track {
            display: flex;
            width: 300%; 
            height: 100%;
            animation: marquee 12s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        .marquee-slide {
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
        }

        @keyframes marquee {
            0%, 28% { transform: translateX(0); }
            33%, 61% { transform: translateX(-33.333%); }
            66%, 95% { transform: translateX(-66.666%); }
            100% { transform: translateX(0); }
        }

        /* ================= 粒子画布 ================= */
        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }

        /* ================= 左侧双重数据看板 ================= */
        .live-counter-box {
            position: fixed;
            left: 4%;
            top: 42%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(168, 85, 247, 0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 1.2rem;
            border-radius: 16px;
            z-index: 10;
            min-width: 210px;
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.05);
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .counter-item {
            display: flex;
            flex-direction: column;
        }

        .counter-title {
            font-size: 0.78rem;
            color: #94a3b8;
            letter-spacing: 1px;
            margin-bottom: 0.2rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .live-dot {
            width: 6px;
            height: 6px;
            background: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 8px #10b981;
            animation: pulse 1.5s infinite;
        }
        .blue-dot {
            background: #3b82f6;
            box-shadow: 0 0 8px #3b82f6;
        }

        .counter-number {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.7rem;
            font-weight: 800;
            background: linear-gradient(90deg, #3b82f6, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .player-number {
            background: linear-gradient(90deg, #10b981, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* ================= 左下角：实时会员购买信息通知栏 ================= */
        .live-sales-box {
            position: fixed;
            left: 4%;
            bottom: 4%;
            z-index: 10;
            width: 240px;
            height: 42px;
            overflow: hidden;
            background: rgba(168, 85, 247, 0.06);
            border: 1px solid rgba(168, 85, 247, 0.25);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 10px;
            padding: 0 1rem;
            display: flex;
            align-items: center;
        }

        .sales-track {
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        .sales-item {
            height: 42px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.82rem;
            color: #cbd5e1;
            white-space: nowrap;
            opacity: 1;
        }

        .sales-user {
            font-family: 'Orbitron', sans-serif;
            color: #c084fc;
            font-weight: 700;
        }

        .sales-action {
            color: #94a3b8;
        }

        .sales-badge {
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
            font-size: 0.7rem;
            padding: 0.1rem 0.4rem;
            border-radius: 4px;
            border: 1px solid rgba(59, 130, 246, 0.3);
            font-weight: bold;
        }

        /* ================= 主界面层 ================= */
        .main-ui {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;

        }

        nav a {

            margin-left: 1.2rem;
            font-size: 0.9rem;
            font-weight: 500;
        }

        nav a:hover, nav a.active {
            color: #a855f7;
        }

        .hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            width: 100%;
            margin-top: -1rem;
        }

        .badge {
            font-family: 'Orbitron', sans-serif;
            background: rgba(168, 85, 247, 0.15);
            border: 1px solid rgba(168, 85, 247, 0.4);
            color: #c084fc;
            padding: 0.25rem 0.8rem;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            margin-bottom: 0.8rem;
        }

        .hero h1 {
            font-size: 2.1rem;
            font-weight: 700;
            line-height: 1.3;
            margin-bottom: 0.8rem;
            letter-spacing: -0.5px;
        }

        .hero h1 span {
            background: linear-gradient(90deg, #c084fc, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            font-size: 0.95rem;
            color: #94a3b8;
            margin-bottom: 1.5rem;
            line-height: 1.6;
            max-width: 90%;
            text-shadow: 0 1px 3px rgba(0,0,0,0.9);
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            width: 100%;
            gap: 0.65rem;
            max-width: 320px;
        }

        .btn {
            width: 100%;
            padding: 0.8rem 0; 
            font-size: 0.95rem;
            font-weight: 700;
            border-radius: 14px;
            text-decoration: none;
            text-align: center;
            transition: transform 0.2s, opacity 0.2s;
        }

        .btn:active {
            transform: scale(0.97);
            opacity: 0.9;
        }

        .btn-games {
            background: rgba(255, 255, 255, 0.05);
            color: #f1f5f9;
            border: 1px solid rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .btn-shop {
            background: linear-gradient(90deg, #a855f7, #6366f1);
            color: #ffffff;
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.3);
        }

        .btn-service {
            background: rgba(59, 130, 246, 0.1);
            color: #60a5fa;
            border: 1px solid rgba(59, 130, 246, 0.3);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        footer {
            text-align: center;
            font-size: 0.72rem;
            color: #475569;
            letter-spacing: 0.5px;
        }

        /* ================= 移动端竖屏高级防溢出排版 ================= */
        @media (max-width: 992px) {
            .live-counter-box {
                position: static;
                transform: none;
                margin: 0 auto 0.5rem auto;
                padding: 0.5rem 0.8rem;
                flex-direction: row; 
                justify-content: space-around;
                gap: 15px;
                min-width: 92%;
                border-radius: 16px;
                background: rgba(255, 255, 255, 0.01);
            }
            .counter-title { margin-bottom: 0px; }
            .counter-number { font-size: 1.1rem; }

            .live-sales-box {
                position: static;
                margin: 0.5rem auto 0.5rem auto;
                width: 92%;
                max-width: 320px;
                height: 38px;
                border-radius: 12px;
                justify-content: center;
                background: rgba(168, 85, 247, 0.03);
            }
            .sales-item {
                height: 38px;
                font-size: 0.78rem;
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <script>
        // ======================= 🔐 终极代码安全防御核心系统 =======================
        // 1. 禁用全局右键菜单
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
        });

        // 2. 阻断键盘开发者工具快捷键 (F12、Ctrl+Shift+I、Ctrl+Shift+J、Ctrl+U、Ctrl+S)
        document.addEventListener('keydown', function(e) {
            if (
                e.key === 'F12' || 
                (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'i' || e.key === 'J' || e.key === 'j' || e.key === 'C' || e.key === 'c')) || 
                (e.ctrlKey && (e.key === 'U' || e.key === 'u' || e.key === 'S' || e.key === 's' || e.key === 'H' || e.key === 'h'))
            ) {
                e.preventDefault();
                return false;
            }
        });

        // ======================= 📊 核心数据业务层 =======================
        const COUNTER_KEY = 'sanshub_inject_count_v3';
        const TIME_KEY = 'sanshub_last_time_v3';
        const INCREASE_INTERVAL = 4000; 
        
        const START_DATE_TIMESTAMP = new Date('2026-08-01T00:00:00+08:00').getTime(); 
        const BASE_VALUE = 13899; 

        const USER_PREFIXES = [
            'dog_furry', 'Xiaobai', 'guo_china', 'RobloxPlayer', 'ScriptGod', 
            'VegaX_User', 'Codex', 'Fisch_Hunter', 'Roland', 'F3X_Builder', 
            'Krampus', 'Solara', 'WaveExec', 'Synapse', 'Executor', 'BloxSlayer',
            'SansFan', 'Gamer', 'Shadow', 'Ghost', 'Zero', 'Alpha', 'Neon'
        ];

        function initCounters() {
            const injectEl = document.getElementById('inject-counter');
            const playerEl = document.getElementById('player-counter');
            const now = Date.now();

            // ------------------ 注入次数计算 ------------------
            let savedCount = localStorage.getItem(COUNTER_KEY);
            let lastTime = localStorage.getItem(TIME_KEY);

            const totalTimePassed = now - START_DATE_TIMESTAMP;
            const theoreticalIncrements = Math.floor(totalTimePassed / INCREASE_INTERVAL);
            const currentTheoreticalCount = BASE_VALUE + (theoreticalIncrements > 0 ? theoreticalIncrements : 0);

            if (!savedCount || !lastTime || parseInt(savedCount, 10) < currentTheoreticalCount) {
                savedCount = currentTheoreticalCount;
                lastTime = now;
                localStorage.setItem(COUNTER_KEY, savedCount);
                localStorage.setItem(TIME_KEY, lastTime);
            } else {
                savedCount = parseInt(savedCount, 10);
                lastTime = parseInt(lastTime, 10);
                const timePassed = now - lastTime;
                const missed = Math.floor(timePassed / INCREASE_INTERVAL);
                if (missed > 0) {
                    savedCount += missed;
                    lastTime = now - (timePassed % INCREASE_INTERVAL);
                    localStorage.setItem(COUNTER_KEY, savedCount);
                    localStorage.setItem(TIME_KEY, lastTime);
                }
            }
            injectEl.innerText = savedCount.toLocaleString();

            setInterval(() => {
                savedCount += 1;
                localStorage.setItem(COUNTER_KEY, savedCount);
                localStorage.setItem(TIME_KEY, Date.now());
                injectEl.innerText = savedCount.toLocaleString();
            }, INCREASE_INTERVAL);

            // ------------------ 玩家在线起伏 ------------------
            let currentPlayers = Math.floor(Math.random() * 6) + 12; 
            playerEl.innerText = currentPlayers + " 人";

            setInterval(() => {
                const rand = Math.random();
                let change = rand < 0.35 ? 1 : (rand < 0.70 ? -1 : (rand < 0.85 ? 2 : (rand < 0.98 ? -2 : 0)));
                currentPlayers += change;
                if (currentPlayers < 12) currentPlayers = 13; 
                if (currentPlayers > 27) currentPlayers = 25; 
                playerEl.innerText = currentPlayers + " 人";
            }, 4500);

            // ------------------ 左下角：无缝无BUG流水通知逻辑 ------------------
            const track = document.getElementById('sales-track');
            const userSpan = document.getElementById('sales-user');
            const actionSpan = document.getElementById('sales-action');

            function generateNewSale() {
                // 淡出并瞬移重置
                track.style.opacity = '0';
                
                setTimeout(() => {
                    const randomPrefix = USER_PREFIXES[Math.floor(Math.random() * USER_PREFIXES.length)];
                    const randomSuffix = Math.floor(Math.random() * 89) + 10; 
                    const finalUser = `${randomPrefix}${randomSuffix}`;

                    const actions = ['成功激活 SansHub 终身版', '成功开通 月度特权卡', '获取了最新防检测卡密', '成功充值 250 积分'];
                    const finalAction = actions[Math.floor(Math.random() * actions.length)];

                    userSpan.innerText = finalUser;
                    actionSpan.innerText = finalAction;
                    
                    // 渐显展示新纪录
                    track.style.opacity = '1';
                }, 300);

                // 随机决定后续每次滚动的微妙间隙时间 (5秒~8秒)
                const nextInterval = Math.floor(Math.random() * 3000) + 5000;
                setTimeout(generateNewSale, nextInterval);
            }
            
            // 页面加载完 5 秒后正式开启循环变动
            setTimeout(generateNewSale, 5000);
        }

        document.addEventListener('DOMContentLoaded', initCounters);

        // ======================= 连线粒子画布逻辑 =======================
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const particleCount = 35;
        const connectionDistance = 90; 

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = (Math.random() - 0.5) * 0.5;
                this.radius = Math.random() * 1.5 + 1;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                if (this.x < 0 || this.x > canvas.width) this.vx = -this.vx;
                if (this.y < 0 || this.y > canvas.height) this.vy = -this.vy;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(168, 85, 247, 0.5)';
                ctx.fill();
            }
        }

        for (let i = 0; i < particleCount; i++) {
            particles.push(new Particle());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });

            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < connectionDistance) {
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        const alpha = (1 - dist / connectionDistance) * 0.15;
                        ctx.strokeStyle = `rgba(99, 102, 241, ${alpha})`;
                        ctx.lineWidth = 0.6;
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(animate);
        }
        animate();
    </script>
