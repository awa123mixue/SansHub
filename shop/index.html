<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SansHub商城</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0a0a0a;
      --bg-secondary: #111111;
      --bg-tertiary: #1a1a1a;
      --bg-card: #141414;
      --text-primary: #f0f0f0;
      --text-secondary: #a0a0a0;
      --text-muted: #666666;
      --accent: #d4af37;
      --accent-hover: #c5a028;
      --accent-light: #2a2410;
      --border: #2a2a2a;
      --border-light: #1f1f1f;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.4);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.6);
      --shadow-lg: 0 12px 40px rgba(0,0,0,0.8);
      --radius-sm: 8px;
      --radius: 12px;
      --radius-lg: 16px;
      --radius-xl: 20px;
      --transition: 0.3s cubic-bezier(0.4,0,0.2,1);
      --font-sans: 'Inter', sans-serif;
      --font-display: 'Playfair Display', serif;
      --header-height: 72px;
      --cart-width: 420px;
      --max-width: 1280px;
    }
    *{ box-sizing:border-box; margin:0; padding:0; }
    html{ scroll-behavior:smooth; -webkit-font-smoothing:antialiased; }
    body{
      font-family:var(--font-sans);
      background:var(--bg-primary);
      color:var(--text-primary);
      line-height:1.6;
      min-height:100vh;
      overflow-x:hidden;
      padding-top:var(--header-height);
    }
    a{ text-decoration:none; color:inherit; }
    button{ font-family:inherit; cursor:pointer; border:none; background:none; font-size:inherit; color:inherit; }

    .header{
      position:fixed; top:0; left:0; right:0; z-index:1000;
      height:var(--header-height);
      background:rgba(10,10,10,0.9);
      backdrop-filter:blur(20px);
      border-bottom:1px solid var(--border-light);
      display:flex; align-items:center;
    }
    .header.scrolled{ box-shadow:var(--shadow-md); background:rgba(10,10,10,0.95); }
    .header-inner{
      width:100%; max-width:var(--max-width); margin:0 auto; padding:0 24px;
      display:flex; align-items:center; justify-content:space-between; gap:20px;
    }
    .logo{
      font-family:var(--font-display); font-size:1.65rem; font-weight:700;
      color:var(--accent); letter-spacing:-0.02em; display:flex; align-items:center; gap:8px; cursor:pointer;
    }
    .logo-icon{
      width:38px; height:38px; background:var(--accent); border-radius:var(--radius-sm);
      display:flex; align-items:center; justify-content:center; color:#0a0a0a; font-size:1.1rem;
    }
    .header-actions{ display:flex; align-items:center; gap:12px; }
    .cart-toggle-btn{
      position:relative; width:44px; height:44px; border-radius:50%;
      display:flex; align-items:center; justify-content:center; background:var(--bg-tertiary);
      transition:var(--transition); font-size:1.2rem; color:var(--text-primary);
    }
    .cart-toggle-btn:hover{ background:#2a2a2a; transform:scale(1.05); }
    .cart-badge{
      position:absolute; top:2px; right:2px; width:20px; height:20px; border-radius:50%;
      background:var(--accent); color:#0a0a0a; font-size:0.7rem; font-weight:700;
      display:flex; align-items:center; justify-content:center; transition:var(--transition);
      transform:scale(0); pointer-events:none;
    }
    .cart-badge.visible{ transform:scale(1); animation:badgePop 0.35s ease; }
    @keyframes badgePop{ 0%{transform:scale(0)} 60%{transform:scale(1.35)} 100%{transform:scale(1)} }

    .main-content{ max-width:var(--max-width); margin:0 auto; padding:28px 24px 60px; }

    /* 客服选择页面 */
    .agent-page{
      background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-xl);
      padding:40px 24px; text-align:center;
    }
    .agent-page h2{ font-family:var(--font-display); font-size:1.8rem; color:var(--accent); margin-bottom:32px; }
    .agent-cards{ display:flex; flex-wrap:wrap; gap:20px; justify-content:center; }
    .agent-card{
      background:var(--bg-tertiary); border:2px solid transparent; border-radius:var(--radius-lg);
      padding:24px 20px; width:220px; text-align:center; cursor:pointer;
      transition:var(--transition); color:var(--text-secondary);
    }
    .agent-card:hover{ border-color:var(--accent); color:var(--text-primary); transform:translateY(-4px); }
    .agent-card.active{ border-color:var(--accent); background:var(--accent-light); color:var(--accent); }
    .agent-avatar{
      width:72px; height:72px; border-radius:50%; overflow:hidden; margin:0 auto 12px;
      border:2px solid var(--border); background:#222;
    }
    .agent-avatar img{ width:100%; height:100%; object-fit:cover; }
    .agent-name{ font-weight:600; font-size:1.05rem; }
    .agent-qq{ font-size:0.8rem; color:var(--text-muted); margin-top:4px; }
    .agent-desc{ font-size:0.78rem; color:var(--accent); margin-top:8px; line-height:1.4; }

    /* 商品页面 */
    .product-page-header{
      display:flex; align-items:center; justify-content:space-between;
      margin-bottom:24px; flex-wrap:wrap; gap:12px;
    }
    .back-btn{
      background:var(--bg-tertiary); padding:10px 18px; border-radius:24px;
      font-weight:500; color:var(--text-secondary); transition:var(--transition);
      display:flex; align-items:center; gap:8px;
    }
    .back-btn:hover{ background:#2a2a2a; color:var(--accent); }
    .section-title{ font-family:var(--font-display); font-size:1.5rem; }
    .results-count{ font-size:0.85rem; color:var(--text-muted); }
    .product-grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(260px,1fr)); gap:20px; }
    .product-card{
      background:var(--bg-card); border-radius:var(--radius-lg); overflow:hidden;
      border:1px solid var(--border-light); transition:var(--transition);
      display:flex; flex-direction:column; cursor:pointer;
    }
    .product-card:hover{ transform:translateY(-4px); box-shadow:var(--shadow-lg); border-color:var(--accent); }
    .product-image-wrapper{ position:relative; width:100%; aspect-ratio:1/1; overflow:hidden; background:#1a1a1a; }
    .product-image{ width:100%; height:100%; object-fit:cover; transition:transform 0.5s ease; }
    .product-card:hover .product-image{ transform:scale(1.06); }
    .product-info{ padding:16px 18px 18px; flex:1; display:flex; flex-direction:column; gap:6px; }
    .product-name{ font-weight:600; font-size:1rem; line-height:1.35; }
    .product-price{ font-weight:700; font-size:1.2rem; color:var(--text-primary); }
    .add-to-cart-btn{
      margin-top:10px; width:100%; padding:11px; border-radius:var(--radius);
      background:var(--accent); color:#0a0a0a; font-weight:700; font-size:0.9rem;
      transition:var(--transition); display:flex; align-items:center; justify-content:center; gap:8px;
    }
    .add-to-cart-btn:hover{ background:var(--accent-hover); transform:translateY(-1px); }
    .add-to-cart-btn:active{ transform:scale(0.97); }
    .add-to-cart-btn.in-cart{ background:#2a5a2a; pointer-events:none; }
    .empty-state{ text-align:center; padding:60px 20px; grid-column:1/-1; color:var(--text-muted); }

    .cart-overlay{ position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:2000; opacity:0; pointer-events:none; transition:opacity var(--transition); }
    .cart-overlay.open{ opacity:1; pointer-events:auto; }
    .cart-sidebar{
      position:fixed; top:0; right:0; bottom:0; width:var(--cart-width); max-width:92vw;
      background:var(--bg-secondary); z-index:2001; display:flex; flex-direction:column;
      transform:translateX(110%); transition:transform 0.4s ease; box-shadow:var(--shadow-xl);
    }
    .cart-sidebar.open{ transform:translateX(0); }
    .cart-header{ display:flex; align-items:center; justify-content:space-between; padding:20px 24px; border-bottom:1px solid var(--border); }
    .cart-items{ flex:1; overflow-y:auto; padding:16px 20px; display:flex; flex-direction:column; gap:14px; }
    .cart-items.slide-out-up { animation: slideOutUp 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards; pointer-events: none; }
    @keyframes slideOutUp { from { transform: translateY(0); opacity: 1; } to { transform: translateY(-20px); opacity: 0; } }
    .cart-item{ display:flex; gap:14px; padding:10px; border-radius:var(--radius); background:var(--bg-card); align-items:center; }
    .cart-item-image{ width:64px; height:64px; border-radius:var(--radius-sm); object-fit:cover; background:#222; }
    .cart-item-details{ flex:1; }
    .cart-item-name{ font-weight:600; font-size:0.9rem; }
    .cart-item-price{ font-weight:700; color:var(--accent); }
    .cart-item-qty{ display:flex; align-items:center; gap:6px; margin-top:4px; }
    .qty-btn{ width:26px; height:26px; border-radius:50%; background:var(--bg-tertiary); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; }
    .cart-item-remove{ color:var(--text-muted); padding:6px; border-radius:50%; }
    .cart-item-remove:hover{ color:#e74c3c; background:#2a1515; }
    .qr-section{
      display:none; flex:1; overflow-y:auto; flex-direction:column; align-items:center; justify-content:center;
      padding:20px; text-align:center; background:var(--bg-card); gap:24px;
    }
    .qr-section.show{ display:flex; }
    .qr-section img{ max-width:200px; border-radius:var(--radius); border:2px solid var(--accent); }
    .qr-buttons{ display:flex; gap:12px; margin-top:20px; }
    .btn{ padding:10px 24px; border-radius:24px; font-weight:600; }
    .btn-primary{ background:var(--accent); color:#0a0a0a; }
    .btn-secondary{ background:var(--bg-tertiary); color:var(--text-primary); border:1px solid var(--border); }
    .cart-footer{ border-top:1px solid var(--border); padding:18px 24px 24px; background:var(--bg-card); }
    .checkout-btn{ width:100%; padding:14px; border-radius:var(--radius); background:var(--accent); color:#0a0a0a; font-weight:700; margin-top:16px; }
    .toast-container{ position:fixed; bottom:28px; left:50%; transform:translateX(-50%); z-index:3000; }
    .toast{ background:#f0f0f0; color:#0a0a0a; padding:12px 22px; border-radius:28px; animation:toastIn 0.4s ease, toastOut 0.35s ease 2.2s forwards; }
    @keyframes toastIn{ from{opacity:0; transform:translateY(30px)} to{opacity:1; transform:translateY(0)} }
    @keyframes toastOut{ from{opacity:1; transform:translateY(0)} to{opacity:0; transform:translateY(-20px)} }
    .modal-overlay{ position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:2500; display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; }
    .modal-overlay.open{ opacity:1; pointer-events:auto; }
    .modal{ background:var(--bg-secondary); border-radius:var(--radius-xl); padding:32px; max-width:420px; border:1px solid var(--accent); text-align:center; }
  </style>
</head>
<body>
  <header class="header" id="header">
    <div class="header-inner">
      <div class="logo" onclick="window.scrollTo({top:0,behavior:'smooth'})">
        <span class="logo-icon"><i class="fa-solid fa-store"></i></span>
        Shop
      </div>
      <div class="header-actions">
        <button class="cart-toggle-btn" id="cartToggleBtn">
          <i class="fa-solid fa-bag-shopping"></i>
          <span class="cart-badge" id="cartBadge">0</span>
        </button>
      </div>
    </div>
  </header>

  <main class="main-content">
    <!-- 客服选择页面 -->
    <div id="agentPage" class="agent-page">
      <h2>👥 选择客服</h2>
      <div class="agent-cards" id="agentCards"></div>
      <p style="color:var(--text-muted); margin-top:24px;">* 客服购买后不可变更未来售后服务,购买后请联系对应客服</p>
    </div>

    <!-- 商品页面 (默认隐藏) -->
    <div id="productPage" style="display:none;">
      <div class="product-page-header">
        <button class="back-btn" id="backToAgentBtn"><i class="fa-solid fa-arrow-left"></i> 返回选择客服</button>
        <h2 class="section-title" id="productPageTitle">商品列表</h2>
        <span class="results-count" id="resultsCount"></span>
      </div>
      <div class="product-grid" id="productGrid"></div>
      <div class="empty-state" id="emptyState" style="display:none;">
        <div class="empty-state-icon">📦</div>
        <h3>该客服暂无商品</h3>
      </div>
    </div>
  </main>

  <!-- 购物车侧边栏 -->
  <div class="cart-overlay" id="cartOverlay"></div>
  <aside class="cart-sidebar" id="cartSidebar">
    <div class="cart-header"><h3>🛒 购物车 <span id="cartCountLabel">0件</span></h3><button id="cartCloseBtn"><i class="fa-solid fa-xmark"></i></button></div>
    <div class="cart-items" id="cartItems"><div class="cart-empty">购物车空空如也</div></div>
    <div class="qr-section" id="qrSection">
      <div id="step1"><h4>📱 第一步：支付客服佣金</h4><img id="qrImage1"><p>¥<span id="agentTotal">0</span></p></div>
      <div id="step2"><h4>📱 第二步：支付剩余款项</h4><img id="qrImage2"><p>¥<span id="secondQrTotal">0</span></p></div>
      <div class="qr-buttons">
        <button class="btn btn-secondary" id="backToCartBtn">返回购物车</button>
        <button class="btn btn-primary" id="paidBtn">返回购物车[ 支付成功 ]</button>
      </div>
    </div>
    <div class="cart-footer" id="cartFooter" style="display:none;">
      <div><span>小计</span><span id="cartSubtotal">¥0</span></div>
      <div><span>客服</span><span id="cartAgentName">-</span></div>
      <div><span>合计</span><span id="cartTotal">¥0</span></div>
      <button class="checkout-btn" id="checkoutBtn">💳 去结算</button>
    </div>
  </aside>

  <div class="modal-overlay" id="conflictModal"><div class="modal"><h2>⚠️ 客服冲突</h2><p id="conflictMsg"></p><div><button class="btn btn-secondary" id="conflictCancel">取消</button><button class="btn btn-primary" id="conflictConfirm">清空并添加</button></div></div></div>
  <div class="toast-container" id="toastContainer"></div>

  <script>
    (function() {
      const agents = [
        { id: 'agent1', name: '枫洛', qq: '2984967309', avatar: 'https://q1.qlogo.cn/g?b=qq&nk=2984967309&s=100', paymentQR1: 'https://i.postimg.cc/X7qQKKxR/Screenshot-2026-04-12-21-53-38-311-com-tencent-mm.jpg', paymentQR2: 'https://i.postimg.cc/bvTsTVb0/QQ20260708-173514.png', desc: '总经理' },
        { id: 'agent2', name: 'thrcvb', qq: '3429983254', avatar: 'https://q1.qlogo.cn/g?b=qq&nk=3429983254&s=100', paymentQR1: 'https://i.postimg.cc/k5zXfrGL/QQ20260708-173826.png', paymentQR2: 'https://i.postimg.cc/bvTsTVb0/QQ20260708-173514.png', desc: '客服身份' },
        { id: 'agent3', name: '红温狗', qq: '2304738737', avatar: 'https://q1.qlogo.cn/g?b=qq&nk=2304738737&s=100', paymentQR1: 'https://i.postimg.cc/B6jPncLg/QQ20260708-173529.png', paymentQR2: 'https://i.postimg.cc/bvTsTVb0/QQ20260708-173514.png', desc: '客服' }
      ];
      const products = [
        { id:'p1', name:'SansHub激活卡 [ 永久 ]', price:50, commissions:{agent1:10,agent2:10,agent3:5}, image:'https://picsum.photos/seed/sanshub1/500/500' },
        { id:'p2', name:'SansHub售后服务 [ 扩容账户 ]', price:20, commissions:{agent1:10,agent2:10,agent3:5}, image:'https://picsum.photos/seed/sanshub2/500/500' },
        { id:'p3', name:'SansHub售后服务 [ 变更账户 ]', price:3, commissions:{agent1:3,agent2:3,agent3:3}, noSecondQR:true, image:'https://picsum.photos/seed/sanshub3/500/500' },
        { id:'p4', name:'SansHub社区产品 [ 10抽奖产品 ]', price:10, agentId:'agent1', commissions:{agent1:10}, noSecondQR:true, image:'https://picsum.photos/seed/sanshub4/500/500' }
      ];

      let selectedAgentId = null;
      let cart = [], cartAgentId = null;

      const $ = id => document.getElementById(id);
      const agentCards = $('agentCards'), productPage = $('productPage'), agentPage = $('agentPage');
      const productGrid = $('productGrid'), emptyState = $('emptyState');
      const cartBadge = $('cartBadge'), cartCountLabel = $('cartCountLabel'), cartItems = $('cartItems');
      const cartFooter = $('cartFooter'), cartSubtotal = $('cartSubtotal'), cartTotal = $('cartTotal'), cartAgentName = $('cartAgentName');
      const checkoutBtn = $('checkoutBtn'), qrSection = $('qrSection'), qrImage1 = $('qrImage1'), qrImage2 = $('qrImage2');
      const agentTotal = $('agentTotal'), secondQrTotal = $('secondQrTotal'), step2Div = $('step2');

      function saveCart() { localStorage.setItem('shop_cart', JSON.stringify({cart,agentId:cartAgentId})); }
      function loadCart() {
        try {
          const d = JSON.parse(localStorage.getItem('shop_cart'));
          if(d && Array.isArray(d.cart)) { cart = d.cart.filter(i=>i&&i.qty>0); cartAgentId = d.agentId||null; }
        } catch(e){}
      }
      function getCartCount() { return cart.reduce((s,i)=>s+i.qty,0); }
      function getSubtotal() { return cart.reduce((s,i)=>{ const p = products.find(x=>x.id===i.id); return s+(p?p.price*i.qty:0); },0); }
      function getAgent(id) { return agents.find(a=>a.id===id); }

      function renderAgentCards() {
        agentCards.innerHTML = agents.map(a => `
          <div class="agent-card" data-id="${a.id}">
            <div class="agent-avatar"><img src="${a.avatar}" onerror="this.style.background='#333';"></div>
            <div class="agent-name">${a.name}</div>
            <div class="agent-qq">QQ:${a.qq}</div>
            <div class="agent-desc">${a.desc}</div>
          </div>`).join('');
        document.querySelectorAll('.agent-card').forEach(c => c.addEventListener('click', ()=>{
          const id = c.dataset.id;
          if(cart.length && cartAgentId && cartAgentId!==id) {
            showConflict(`切换到「${getAgent(id).name}」将清空购物车，继续？`, ()=>{ clearCart(); selectAgent(id); });
          } else selectAgent(id);
        }));
      }

      function selectAgent(id) {
        selectedAgentId = id;
        agentPage.style.display = 'none';
        productPage.style.display = 'block';
        if(cart.length===0) cartAgentId = id;
        renderProducts();
        updateCartUI();
      }

      function backToAgent() {
        agentPage.style.display = 'block';
        productPage.style.display = 'none';
        selectedAgentId = null;
      }

      function clearCart() { cart=[]; cartAgentId=null; saveCart(); updateCartUI(); if(qrSection.classList.contains('show')) hideQR(); }

      function getProducts() {
        if(!selectedAgentId) return [];
        return products.filter(p => !p.agentId || p.agentId === selectedAgentId);
      }

      function renderProducts() {
        const list = getProducts();
        productGrid.innerHTML = '';
        emptyState.style.display = list.length?'none':'';
        $('resultsCount').textContent = `共 ${list.length} 件`;
        list.forEach(p => {
          const inCart = cart.find(i=>i.id===p.id);
          const card = document.createElement('div'); card.className='product-card';
          card.innerHTML = `
            <div class="product-image-wrapper"><img class="product-image" src="${p.image}" onerror="this.style.background='#222';"></div>
            <div class="product-info">
              <span class="product-name">${p.name}</span>
              <span class="product-price">¥${p.price}</span>
              <button class="add-to-cart-btn ${inCart?'in-cart':''}" data-id="${p.id}">
                <i class="fa-solid fa-cart-plus"></i> ${inCart?'已添加':'加入购物车'}
              </button>
            </div>`;
          productGrid.appendChild(card);
        });
        document.querySelectorAll('.add-to-cart-btn').forEach(b => b.addEventListener('click', e=>{ e.stopPropagation(); handleAdd(b.dataset.id); }));
      }

      function handleAdd(pid) {
        if(cart.length && cartAgentId && cartAgentId!==selectedAgentId) {
          showConflict(`购物车属于其他客服，添加将清空，继续？`, ()=>{ clearCart(); cartAgentId=selectedAgentId; addToCart(pid); });
        } else {
          if(!cart.length) cartAgentId=selectedAgentId;
          addToCart(pid);
        }
      }
      function addToCart(pid) {
        const ex = cart.find(i=>i.id===pid);
        if(ex) ex.qty++; else cart.push({id:pid,qty:1});
        showToast('✅ 已添加'); updateCartUI(); renderProducts();
      }
      function removeItem(pid) { cart=cart.filter(i=>i.id!==pid); if(!cart.length) cartAgentId=null; updateCartUI(); renderProducts(); saveCart(); }

      cartItems.addEventListener('click', e=>{
        const btn = e.target.closest('.cart-item-remove');
        if(btn) { const p = products.find(x=>x.id===btn.dataset.id); if(p && confirm(`移除「${p.name}」？`)) { removeItem(btn.dataset.id); showToast('已移除'); } }
      });

      function updateCartUI() {
        const cnt = getCartCount(); cartBadge.textContent=cnt; cartBadge.classList.toggle('visible',cnt>0); cartCountLabel.textContent=cnt+'件';
        if(qrSection.classList.contains('show')) return;
        if(!cart.length) { cartItems.innerHTML='<div class="cart-empty">购物车空空如也</div>'; cartFooter.style.display='none'; }
        else {
          cartItems.innerHTML = cart.map(i=>{
            const p=products.find(x=>x.id===i.id); if(!p) return '';
            return `<div class="cart-item"><img class="cart-item-image" src="${p.image}"><div class="cart-item-details"><div class="cart-item-name">${p.name}</div><div class="cart-item-price">¥${p.price*i.qty}</div><div class="cart-item-qty"><button class="qty-btn" data-id="${p.id}" data-d="-1">−</button><span>${i.qty}</span><button class="qty-btn" data-id="${p.id}" data-d="1">+</button></div></div><button class="cart-item-remove" data-id="${p.id}"><i class="fa-solid fa-trash-can"></i></button></div>`;
          }).join('');
          cartFooter.style.display='block';
          const sub = getSubtotal(); cartSubtotal.textContent='¥'+sub; cartTotal.textContent='¥'+sub;
          cartAgentName.textContent = getAgent(cartAgentId)?.name||'未知';
        }
        document.querySelectorAll('.qty-btn').forEach(b=>b.addEventListener('click',()=>{
          const id=b.dataset.id, d=parseInt(b.dataset.d);
          const item=cart.find(i=>i.id===id); if(item){ item.qty+=d; if(item.qty<=0) cart=cart.filter(i=>i.id!==id); if(!cart.length) cartAgentId=null; updateCartUI(); renderProducts(); saveCart(); }
        }));
        saveCart();
      }

      function showQR() {
        const agent = getAgent(cartAgentId); if(!agent) return;
        let comm=0, rem=0;
        cart.forEach(i=>{ const p=products.find(x=>x.id===i.id); if(p){ const c=p.commissions?.[cartAgentId]||0; const tot=p.price*i.qty; if(p.noSecondQR){ comm+=tot; rem+=0; } else { comm+=c*i.qty; rem+=(tot-c*i.qty); } } });
        qrImage1.src=agent.paymentQR1; qrImage2.src=agent.paymentQR2;
        agentTotal.textContent=comm.toFixed(2); secondQrTotal.textContent=rem.toFixed(2);
        step2Div.style.display = rem===0?'none':'';
        cartItems.classList.add('slide-out-up'); cartFooter.style.display='none';
        cartItems.addEventListener('animationend', function h(){ cartItems.style.display='none'; qrSection.classList.add('show'); cartItems.removeEventListener('animationend',h); },{once:true});
      }
      function hideQR(){ qrSection.classList.remove('show'); cartItems.classList.remove('slide-out-up'); cartItems.style.display='flex'; cartFooter.style.display=cart.length?'block':'none'; updateCartUI(); }

      checkoutBtn.addEventListener('click', ()=>{ if(cart.length) showQR(); });
      $('backToCartBtn').addEventListener('click', hideQR);
      $('paidBtn').addEventListener('click', ()=>{ showToast('支付成功'); clearCart(); hideQR(); closeCart(); });
      $('backToAgentBtn').addEventListener('click', backToAgent);

      function showConflict(msg, cb){ $('conflictMsg').textContent=msg; $('conflictModal').classList.add('open'); $('conflictConfirm').onclick=()=>{cb(); closeConflict();}; $('conflictCancel').onclick=closeConflict; }
      function closeConflict(){ $('conflictModal').classList.remove('open'); }

      function openCart(){ $('cartSidebar').classList.add('open'); $('cartOverlay').classList.add('open'); updateCartUI(); }
      function closeCart(){ $('cartSidebar').classList.remove('open'); $('cartOverlay').classList.remove('open'); }
      $('cartToggleBtn').addEventListener('click', ()=> $('cartSidebar').classList.contains('open')?closeCart():openCart());
      $('cartCloseBtn').addEventListener('click', closeCart);
      $('cartOverlay').addEventListener('click', closeCart);

      function showToast(msg){ const t=document.createElement('div'); t.className='toast'; t.textContent=msg; $('toastContainer').appendChild(t); setTimeout(()=>t.remove(),2600); }

      loadCart(); renderAgentCards();
      if(cart.length && cartAgentId) { selectedAgentId=cartAgentId; agentPage.style.display='none'; productPage.style.display='block'; renderProducts(); } else { selectedAgentId=null; }
      updateCartUI();
    })();
  </script>
</body>
</html>
