<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SansHub商城</title>
  
  <!-- 引入科幻感专属字体与图标库 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;800&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-primary: #000000;
      --bg-secondary: #0a0a0c;
      --bg-card: rgba(255, 255, 255, 0.02);
      --border-glow: rgba(168, 85, 247, 0.2);
      --border-glow-hover: rgba(168, 85, 247, 0.5);
      --text-primary: #e2e8f0;
      --text-secondary: #94a3b8;
      --text-muted: #475569;
      --accent-linear: linear-gradient(90deg, #a855f7, #6366f1);
      --accent-blue: linear-gradient(90deg, #3b82f6, #6366f1);
      --font-sans: 'Noto Sans SC', -apple-system, sans-serif;
      --font-display: 'Orbitron', sans-serif;
      --header-height: 72px;
      --cart-width: 420px;
      --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* 高级防全选反蓝，贴合首页安全机制 */
    * { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
    }

    html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
    body {
      font-family: var(--font-sans);
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
      padding-top: var(--header-height);
      transition: opacity 0.3s ease;
    }
    body.fade-out { opacity: 0; }
    a { text-decoration: none; color: inherit; }
    button { font-family: inherit; cursor: pointer; border: none; background: none; font-size: inherit; color: inherit; }

    /* ================= 顶栏对齐首页 ================= */
    .header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      height: var(--header-height);
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      display: flex; align-items: center;
    }
    .header-inner {
      width: 100%; max-width: 1280px; margin: 0 auto; padding: 0 6%;
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo {
      font-family: var(--font-display); font-size: 1.6rem; font-weight: 800;
      background: linear-gradient(45deg, #a855f7, #3b82f6);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      letter-spacing: 1px; display: flex; align-items: center; gap: 10px; cursor: pointer;
    }
    .header-actions { display: flex; align-items: center; gap: 12px; }
    
    /* 统一顶栏控制键的基础样式 */
    .nav-action-btn {
      position: relative; height: 42px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center; 
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      transition: var(--transition); color: var(--text-primary);
      font-size: 1.05rem;
    }
    .nav-action-btn:hover { 
      background: rgba(168, 85, 247, 0.08); 
      border-color: var(--border-glow-hover); 
      transform: translateY(-1px);
      box-shadow: 0 0 15px rgba(168, 85, 247, 0.15);
    }
    .nav-action-btn:active { transform: translateY(1px) scale(0.98); }
    
    /* 独立按钮宽度与特征控制 */
    .cart-toggle-btn { width: 44px; }
    .home-back-btn { 
      padding: 0 16px; 
      gap: 8px; 
      font-size: 0.85rem; 
      font-weight: 700; 
      color: var(--text-secondary);
    }
    .home-back-btn:hover { color: var(--text-primary); }

    .cart-badge {
      position: absolute; top: -5px; right: -5px; min-width: 18px; height: 18px; padding: 0 5px; border-radius: 50%;
      background: #a855f7; color: #ffffff; font-size: 0.7rem; font-weight: 700; font-family: var(--font-display);
      display: flex; align-items: center; justify-content: center; transition: var(--transition);
      transform: scale(0); box-shadow: 0 0 10px rgba(168, 85, 247, 0.5);
    }
    .cart-badge.visible { transform: scale(1); animation: badgePop 0.35s ease; }
    @keyframes badgePop { 0% { transform: scale(0) } 60% { transform: scale(1.3) } 100% { transform: scale(1) } }

    .main-content { max-width: 1280px; margin: 0 auto; padding: 40px 6% 60px; position: relative; z-index: 10; }

    /* ================= 列表卡片通用赛博重构 ================= */
    .agent-page {
      background: var(--bg-secondary); border: 1px solid var(--border-glow); 
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      border-radius: 20px; padding: 40px 24px; text-align: center;
      box-shadow: 0 0 30px rgba(168, 85, 247, 0.02);
    }
    .agent-page h2 { font-family: var(--font-sans); font-weight: 700; font-size: 1.8rem; letter-spacing: 0.5px; margin-bottom: 32px; }
    .agent-page h2 span { background: var(--accent-linear); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .agent-cards { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
    
    .agent-card {
      background: rgba(255, 255, 255, 0.01); border: 1px solid var(--border-glow); border-radius: 16px;
      padding: 24px 20px; width: 220px; text-align: center; cursor: pointer;
      transition: var(--transition); color: var(--text-secondary);
    }
    .agent-card:hover { border-color: #a855f7; color: var(--text-primary); transform: translateY(-4px); box-shadow: 0 4px 20px rgba(168, 85, 247, 0.15); }
    .agent-card.active { border-color: #6366f1; background: rgba(168, 85, 247, 0.06); color: #c084fc; }
    
    .agent-avatar {
      width: 72px; height: 72px; border-radius: 50%; overflow: hidden; margin: 0 auto 14px;
      border: 2px solid rgba(168, 85, 247, 0.3); background: #111; transition: var(--transition);
    }
    .agent-card:hover .agent-avatar { border-color: #a855f7; transform: scale(1.05); }
    .agent-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .agent-name { font-weight: 700; font-size: 1.1rem; color: var(--text-primary); }
    .agent-qq { font-family: var(--font-display); font-size: 0.8rem; color: var(--text-muted); margin-top: 4px; }
    .agent-desc { font-size: 0.78rem; background: rgba(168, 85, 247, 0.15); color: #c084fc; padding: 2px 8px; border-radius: 20px; display: inline-block; margin-top: 10px; border: 1px solid rgba(168, 85, 247, 0.2); }

    /* ================= 商品页面样式 ================= */
    .product-page-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 30px; flex-wrap: wrap; gap: 16px;
    }
    .back-btn {
      background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.08);
      padding: 10px 20px; border-radius: 12px; font-weight: 700; color: var(--text-secondary); transition: var(--transition);
      display: flex; align-items: center; gap: 8px; font-size: 0.9rem;
    }
    .back-btn:hover { background: rgba(168, 85, 247, 0.1); border-color: var(--border-glow-hover); color: #c084fc; }
    .section-title { font-size: 1.6rem; font-weight: 700; }
    .results-count { font-family: var(--font-display); font-size: 0.85rem; color: var(--text-muted); background: rgba(255, 255, 255, 0.02); padding: 4px 10px; border-radius: 6px; border: 1px solid rgba(255, 255, 255, 0.05); }
    
    .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 24px; }
    .product-card {
      background: var(--bg-secondary); border-radius: 16px; overflow: hidden;
      border: 1px solid var(--border-glow); transition: var(--transition);
      display: flex; flex-direction: column; cursor: pointer; position: relative;
    }
    .product-card:hover { transform: translateY(-5px); box-shadow: 0 8px 30px rgba(168, 85, 247, 0.12); border-color: #a855f7; }
    .product-image-wrapper { position: relative; width: 100%; aspect-ratio: 1/1; overflow: hidden; background: #050505; border-bottom: 1px solid rgba(255,255,255,0.02); }
    .product-image { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
    .product-card:hover .product-image { transform: scale(1.08); }
    
    .product-info { padding: 18px; flex: 1; display: flex; flex-direction: column; gap: 8px; }
    .product-name { font-weight: 700; font-size: 1.05rem; line-height: 1.4; color: var(--text-primary); }
    .product-price { font-family: var(--font-display); font-weight: 800; font-size: 1.35rem; background: var(--accent-blue); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    
    .add-to-cart-btn {
      margin-top: auto; width: 100%; padding: 12px; border-radius: 12px;
      background: var(--accent-linear); color: #ffffff; font-weight: 700; font-size: 0.9rem;
      transition: var(--transition); display: flex; align-items: center; justify-content: center; gap: 8px;
      box-shadow: 0 4px 12px rgba(168, 85, 247, 0.2);
    }
    .add-to-cart-btn:hover { opacity: 0.95; transform: translateY(-1px); box-shadow: 0 4px 15px rgba(168, 85, 247, 0.35); }
    .add-to-cart-btn:active { transform: scale(0.97); }
    .add-to-cart-btn.in-cart { background: rgba(16, 185, 129, 0.15); border: 1px solid rgba(16, 185, 129, 0.4); color: #10b981; pointer-events: none; box-shadow: none; }
    .empty-state { text-align: center; padding: 60px 20px; grid-column: 1/-1; color: var(--text-muted); font-size: 1.1rem; }

    /* ================= 购物车侧边栏 ================= */
    .cart-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.75); z-index: 2000; opacity: 0; pointer-events: none; transition: opacity var(--transition); backdrop-filter: blur(4px); }
    .cart-overlay.open { opacity: 1; pointer-events: auto; }
    
    .cart-sidebar {
      position: fixed; top: 0; right: 0; bottom: 0; width: var(--cart-width); max-width: 92vw;
      background: #050507; z-index: 2001; display: flex; flex-direction: column;
      transform: translateX(110%); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); 
      border-left: 1px solid var(--border-glow); box-shadow: -10px 0 30px rgba(0,0,0,0.5);
    }
    .cart-sidebar.open { transform: translateX(0); }
    .cart-header { display: flex; align-items: center; justify-content: space-between; padding: 24px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .cart-header h3 { font-size: 1.25rem; font-weight: 700; }
    .cart-header h3 span { font-family: var(--font-display); color: #a855f7; margin-left: 6px; font-size: 0.95rem; }
    #cartCloseBtn { width: 36px; height: 36px; border-radius: 8px; background: rgba(255,255,255,0.03); display: flex; align-items: center; justify-content: center; transition: var(--transition); }
    #cartCloseBtn:hover { background: rgba(231, 76, 60, 0.15); color: #e74c3c; }

    .cart-items { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 14px; }
    .cart-items.slide-out-up { animation: slideOutUp 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards; pointer-events: none; }
    @keyframes slideOutUp { from { transform: translateY(0); opacity: 1; } to { transform: translateY(-20px); opacity: 0; } }
    .cart-empty { text-align: center; color: var(--text-muted); padding: 40px 0; font-size: 0.95rem; }

    .cart-item { display: flex; gap: 14px; padding: 12px; border-radius: 12px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.04); align-items: center; }
    .cart-item-image { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; background: #111; }
    .cart-item-details { flex: 1; }
    .cart-item-name { font-weight: 700; font-size: 0.9rem; color: var(--text-primary); margin-bottom: 2px; }
    .cart-item-price { font-family: var(--font-display); font-weight: 700; color: #a855f7; font-size: 1rem; }
    .cart-item-qty { display: flex; align-items: center; gap: 10px; margin-top: 6px; }
    .qty-btn { width: 24px; height: 24px; border-radius: 6px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; font-size: 0.8rem; transition: var(--transition); }
    .qty-btn:hover { background: #a855f7; color: white; border-color: #a855f7; }
    .cart-item-qty span { font-family: var(--font-display); font-size: 0.9rem; }
    .cart-item-remove { color: var(--text-muted); padding: 8px; border-radius: 8px; transition: var(--transition); }
    .cart-item-remove:hover { color: #e74c3c; background: rgba(231, 76, 60, 0.1); }

    /* ================= 收款二维码区域 ================= */
    .qr-section {
      display: none; flex: 1; overflow-y: auto; flex-direction: column; align-items: center; justify-content: center;
      padding: 24px; text-align: center; gap: 24px;
    }
    .qr-section.show { display: flex; }
    .qr-container { background: rgba(255,255,255,0.01); border: 1px solid var(--border-glow); padding: 20px; border-radius: 16px; width: 100%; max-width: 280px; }
    .qr-container h4 { font-size: 0.95rem; margin-bottom: 12px; font-weight: 700; color: var(--text-primary); }
    .qr-container img { width: 100%; max-width: 180px; aspect-ratio:1/1; border-radius: 12px; border: 2px solid #a855f7; margin: 0 auto; display: block; box-shadow: 0 0 15px rgba(168, 85, 247, 0.2); }
    .qr-container p { font-family: var(--font-display); font-size: 1.3rem; font-weight: 800; color: #ffffff; margin-top: 10px; }
    .qr-buttons { display: flex; flex-direction: column; width: 100%; max-width: 280px; gap: 10px; margin-top: 10px; }
    
    .btn { padding: 12px; border-radius: 12px; font-weight: 700; font-size: 0.9rem; text-align: center; transition: var(--transition); width: 100%; }
    .btn-primary { background: var(--accent-linear); color: #ffffff; box-shadow: 0 4px 15px rgba(168, 85, 247, 0.25); }
    .btn-primary:hover { opacity: 0.95; }
    .btn-secondary { background: rgba(255,255,255,0.04); color: var(--text-secondary); border: 1px solid rgba(255,255,255,0.08); }
    .btn-secondary:hover { background: rgba(255,255,255,0.08); color: var(--text-primary); }

    .cart-footer { border-top: 1px solid rgba(255,255,255,0.05); padding: 20px 24px 24px; background: #070709; }
    .cart-footer-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 0.9rem; color: var(--text-secondary); }
    .cart-footer-row.total { font-size: 1.1rem; color: var(--text-primary); font-weight: 700; border-top: 1px solid rgba(255,255,255,0.03); padding-top: 8px; margin-top: 8px; }
    .cart-footer-row .price-val { font-family: var(--font-display); font-weight: 700; color: #e2e8f0; }
    .cart-footer-row.total .price-val { color: #a855f7; font-size: 1.25rem; font-weight: 800; }
    .checkout-btn { width: 100%; padding: 14px; border-radius: 12px; background: var(--accent-linear); color: #ffffff; font-weight: 700; font-size: 0.95rem; margin-top: 12px; box-shadow: 0 4px 15px rgba(168, 85, 247, 0.3); transition: var(--transition); }
    .checkout-btn:hover { opacity: 0.95; transform: translateY(-1px); }

    /* ================= 提示弹窗与全局组件 ================= */
    .toast-container { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 3000; }
    .toast { background: linear-gradient(90deg, #a855f7, #6366f1); color: #ffffff; padding: 12px 28px; border-radius: 30px; font-weight: 700; font-size: 0.9rem; box-shadow: 0 4px 20px rgba(168, 85, 247, 0.4); animation: toastIn 0.4s ease, toastOut 0.35s ease 2.2s forwards; }
    @keyframes toastIn { from { opacity: 0; transform: translateY(30px) translateX(-50%); } to { opacity: 1; transform: translateY(0) translateX(-50%); } }
    @keyframes toastOut { from { opacity: 1; transform: translateY(0) translateX(-50%); } to { opacity: 0; transform: translateY(-20px) translateX(-50%); } }
    
    .modal-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.85); z-index: 2500; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity var(--transition); backdrop-filter: blur(5px); }
    .modal-overlay.open { opacity: 1; pointer-events: auto; }
    .modal { background: #0a0a0c; border-radius: 20px; padding: 32px; max-width: 90%; width: 400px; border: 1px solid #a855f7; text-align: center; box-shadow: 0 0 30px rgba(168,85,247,0.2); }
    .modal h2 { font-size: 1.3rem; font-weight: 700; margin-bottom: 12px; }
    .modal p { color: var(--text-secondary); font-size: 0.95rem; margin-bottom: 24px; }
    .modal-btns { display: flex; gap: 12px; }

    /* ================= 移动端竖屏高级防溢出排版 ================= */
    @media (max-width: 992px) {
      .main-content { padding: 24px 4% 60px; }
      .agent-page { padding: 28px 16px; }
      .agent-cards { gap: 14px; }
      .agent-card { width: 46%; min-width: 140px; padding: 16px 10px; border-radius: 12px; }
      .agent-avatar { width: 60px; height: 60px; margin-bottom: 10px; }
      .agent-name { font-size: 1rem; }
      .product-grid { grid-template-columns: repeat(2, 1fr); gap: 14px; }
      .product-info { padding: 12px; gap: 6px; }
      .product-name { font-size: 0.9rem; }
      .product-price { font-size: 1.15rem; }
      .add-to-cart-btn { padding: 10px; font-size: 0.8rem; border-radius: 8px; }
      .qr-container { padding: 14px; }
      .home-back-btn span { display: none; } /* 移动端只保留图标以防挤压 */
      .home-back-btn { padding: 0 12px; }
    }
  </style>
</head>
<body>

  <header class="header" id="header">
    <div class="header-inner">
      <div class="logo" onclick="window.scrollTo({top:0,behavior:'smooth'})">
        <span style="display:flex;align-items:center;"><i class="fa-solid fa-store" style="font-size:1.3rem;margin-right:6px;"></i> SansHub</span>商城
      </div>
      <div class="header-actions">
        <!-- 🆕 新增：返回首页功能键 -->
        <button class="nav-action-btn home-back-btn" id="homeBackBtn">
          <i class="fa-solid fa-house"></i>
          <span>返回首页</span>
        </button>
        <!-- 购物车入口 -->
        <button class="nav-action-btn cart-toggle-btn" id="cartToggleBtn">
          <i class="fa-solid fa-bag-shopping"></i>
          <span class="cart-badge" id="cartBadge">0</span>
        </button>
      </div>
    </div>
  </header>

  <main class="main-content">
    <!-- 客服选择页面 -->
    <div id="agentPage" class="agent-page">
      <h2>👥 选择 <span>专属服务客服</span></h2>
      <div class="agent-cards" id="agentCards"></div>
      <p style="color:var(--text-muted); margin-top:24px; font-size:0.75rem;">* 客服购买后不可变更未来售后服务，付款完成后请务必主动添加对应客服 QQ</p>
    </div>

    <!-- 商品页面 -->
    <div id="productPage" style="display:none;">
      <div class="product-page-header">
        <button class="back-btn" id="backToAgentBtn"><i class="fa-solid fa-arrow-left"></i> 返回客服选择</button>
        <h2 class="section-title" id="productPageTitle">资源配置列表</h2>
        <span class="results-count" id="resultsCount"></span>
      </div>
      <div class="product-grid" id="productGrid"></div>
      <div class="empty-state" id="emptyState" style="display:none;">
        <div style="font-size:3rem;margin-bottom:10px;">📦</div>
        <h3>该客服节点暂无关联配置商品</h3>
      </div>
    </div>
  </main>

  <!-- 购物车侧边栏结构 -->
  <div class="cart-overlay" id="cartOverlay"></div>
  <aside class="cart-sidebar" id="cartSidebar">
    <div class="cart-header">
      <h3>🛒 核心载入单 <span id="cartCountLabel">0件</span></h3>
      <button id="cartCloseBtn"><i class="fa-solid fa-xmark"></i></button>
    </div>
    
    <div class="cart-items" id="cartItems">
      <div class="cart-empty">暂无待备资产配置</div>
    </div>
    
    <!-- 收款渲染 -->
    <div class="qr-section" id="qrSection">
      <div id="step1" class="qr-container">
        <h4><i class="fa-solid fa-shield-halved" style="color:#a855f7;margin-right:4px;"></i> 步骤 1：向客服交付技术佣金</h4>
        <img id="qrImage1" alt="支付码1">
        <p>¥<span id="agentTotal">0.00</span></p>
      </div>
      <div id="step2" class="qr-container">
        <h4><i class="fa-solid fa-wallet" style="color:#6366f1;margin-right:4px;"></i> 步骤 2：结算剩余基础配额</h4>
        <img id="qrImage2" alt="支付码2">
        <p>¥<span id="secondQrTotal">0.00</span></p>
      </div>
      <div class="qr-buttons">
        <button class="btn btn-secondary" id="backToCartBtn">核算配置有误？回转</button>
        <button class="btn btn-primary" id="paidBtn"><i class="fa-solid fa-circle-check"></i> 我已全额完成支付</button>
      </div>
    </div>
    
    <div class="cart-footer" id="cartFooter" style="display:none;">
      <div class="cart-footer-row"><span>配额小计</span><span class="price-val" id="cartSubtotal">¥0</span></div>
      <div class="cart-footer-row"><span>分发对接人</span><span id="cartAgentName" style="color:#c084fc;font-weight:700;">-</span></div>
      <div class="cart-footer-row total"><span>核计结算总额</span><span class="price-val" id="cartTotal">¥0</span></div>
      <button class="checkout-btn" id="checkoutBtn">💳 生成专属结算协议</button>
    </div>
  </aside>

  <!-- 客服清空冲突提示弹窗 -->
  <div class="modal-overlay" id="conflictModal">
    <div class="modal">
      <h2>⚠️ 检测到调度变动</h2>
      <p id="conflictMsg"></p>
      <div class="modal-btns">
        <button class="btn btn-secondary" id="conflictCancel">撤销操作</button>
        <button class="btn btn-primary" id="conflictConfirm">同步重置并覆盖</button>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <!-- 特效与商城联动逻辑 + 终极核心防御代码 -->
  <script>
    // ======================= 🔐 终极代码安全防御核心系统 =======================
    document.addEventListener('contextmenu', function(e) { e.preventDefault(); });
    document.addEventListener('keydown', function(e) {
      if (
        e.key === 'F12' || 
        (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'i' || e.key === 'J' || e.key === 'j' || e.key === 'C' || e.key === 'c')) || 
        (e.ctrlKey && (e.key === 'U' || e.key === 'u' || e.key === 'S' || e.key === 's'))
      ) {
        e.preventDefault();
        return false;
      }
    });

    // ======================= 🛒 商城底层交互业务层 =======================
    (function() {
      // 绑定返回首页的转场特效
      const homeBtn = document.getElementById('homeBackBtn');
      if(homeBtn) {
        homeBtn.addEventListener('click', () => {
          document.body.classList.add('fade-out');
          setTimeout(() => {
            window.location.href = 'index.html'; // 如果你的首页文件名不是 index.html，可以在此自行修改
          }, 300);
        });
      }

      const agents = [
        { id: 'agent1', name: '枫洛', qq: '2984967309', avatar: 'https://q1.qlogo.cn/g?b=qq&nk=2984967309&s=100', paymentQR1: 'https://i.postimg.cc/X7qQKKxR/Screenshot-2026-04-12-21-53-38-311-com-tencent-mm.jpg', paymentQR2: 'https://i.postimg.cc/bvTsTVb0/QQ20260708-173514.png', desc: '总经理' },
        { id: 'agent2', name: 'thrcvb', qq: '3429983254', avatar: 'https://q1.qlogo.cn/g?b=qq&nk=3429983254&s=100', paymentQR1: 'https://i.postimg.cc/k5zXfrGL/QQ20260708-173826.png', paymentQR2: 'https://i.postimg.cc/bvTsTVb0/QQ20260708-173514.png', desc: '客服' },
        { id: 'agent3', name: '红温狗', qq: '2304738737', avatar: 'https://q1.qlogo.cn/g?b=qq&nk=2304738737&s=100', paymentQR1: 'https://i.postimg.cc/B6jPncLg/QQ20260708-173529.png', paymentQR2: 'https://i.postimg.cc/bvTsTVb0/QQ20260708-173514.png', desc: '客服' }
      ];
      
      const products = [
        { id:'p1', name:'SansHub激活卡 [ 永久卡密 ]', price:50, commissions:{agent1:10,agent2:10,agent3:5}, image:'https://picsum.photos/seed/sanshub1/500/500' },
        { id:'p2', name:'SansHub售后服务 [ 扩容账户 ]', price:20, commissions:{agent1:10,agent2:10,agent3:5}, image:'https://picsum.photos/seed/sanshub2/500/500' },
        { id:'p3', name:'SansHub售后服务 [ 变更账户 ]', price:3, commissions:{agent1:3,agent2:3,agent3:3}, noSecondQR:true, image:'https://picsum.photos/seed/sanshub3/500/500' },
        { id:'p4', name:'SansHub社区产品 [ 10连抽特权 ]', price:10, agentId:'agent1', commissions:{agent1:10}, noSecondQR:true, image:'https://picsum.photos/seed/sanshub4/500/500' }
      ];

      let selectedAgentId = null;
      let cart = [], cartAgentId = null;

      const $ = id => document.getElementById(id);
      const agentCards = $('agentCards'), productPage = $('productPage'), agentPage = $('agentPage');
      const productGrid = $('productGrid'), emptyState = $('emptyState');
      const cartBadge = $('cartBadge'), cartCountLabel = $('cartCountLabel'), cartItems = $('cartItems');
      const cartFooter = $('cartFooter'), cartSubtotal = $('cartSubtotal'), cartTotal = $('cartTotal'), cartAgentName = $('cartAgentName');
      const checkoutBtn = $('checkoutBtn'), qrSection = $('qrSection'), qrImage1 = $('qrImage1'), qrImage2 = $('qrImage2');
      const agentTotal = $('agentTotal'), secondQrTotal = $('secondQrTotal'), step2Div = $('step2');

      function saveCart() { localStorage.setItem('shop_cart_v3', JSON.stringify({cart,agentId:cartAgentId})); }
      function loadCart() {
        try {
          const d = JSON.parse(localStorage.getItem('shop_cart_v3'));
          if(d && Array.isArray(d.cart)) { cart = d.cart.filter(i=>i&&i.qty>0); cartAgentId = d.agentId||null; }
        } catch(e){}
      }
      
      function getCartCount() { return cart.reduce((s,i)=>s+i.qty,0); }
      function getSubtotal() { return cart.reduce((s,i)=>{ const p = products.find(x=>x.id===i.id); return s+(p?p.price*i.qty:0); },0); }
      function getAgent(id) { return agents.find(a=>a.id===id); }

      function renderAgentCards() {
        agentCards.innerHTML = agents.map(a => `
          <div class="agent-card" data-id="${a.id}">
            <div class="agent-avatar"><img src="${a.avatar}" onerror="this.src='';this.style.background='#111';"></div>
            <div class="agent-name">${a.name}</div>
            <div class="agent-qq">QQ: ${a.qq}</div>
            <div class="agent-desc">${a.desc}</div>
          </div>`).join('');
        
        document.querySelectorAll('.agent-card').forEach(c => c.addEventListener('click', ()=>{
          const id = c.dataset.id;
          if(cart.length && cartAgentId && cartAgentId!==id) {
            showConflict(`更换对接客服「${getAgent(id).name}」将清除现有购物单，是否重置？`, ()=>{ clearCart(); selectAgent(id); });
          } else selectAgent(id);
        }));
      }

      function selectAgent(id) {
        selectedAgentId = id;
        agentPage.style.display = 'none';
        productPage.style.display = 'block';
        if(cart.length===0) cartAgentId = id;
        renderProducts();
        updateCartUI();
      }

      function backToAgent() {
        agentPage.style.display = 'block';
        productPage.style.display = 'none';
        selectedAgentId = null;
      }

      function clearCart() { cart=[]; cartAgentId=null; saveCart(); updateCartUI(); if(qrSection.classList.contains('show')) hideQR(); }

      function getProducts() {
        if(!selectedAgentId) return [];
        return products.filter(p => !p.agentId || p.agentId === selectedAgentId);
      }

      function renderProducts() {
        const list = getProducts();
        productGrid.innerHTML = '';
        emptyState.style.display = list.length?'none':'';
        $('resultsCount').textContent = `共 ${list.length} 个配置型`;
        
        list.forEach(p => {
          const inCart = cart.find(i=>i.id===p.id);
          const card = document.createElement('div'); card.className='product-card';
          card.innerHTML = `
            <div class="product-image-wrapper"><img class="product-image" src="${p.image}" onerror="this.style.background='#111';"></div>
            <div class="product-info">
              <span class="product-name">${p.name}</span>
              <span class="product-price">¥${p.price}</span>
              <button class="add-to-cart-btn ${inCart?'in-cart':''}" data-id="${p.id}">
                <i class="fa-solid ${inCart?'fa-circle-check':'fa-square-plus'}"></i> ${inCart?'分配队列中':'加入购置清单'}
              </button>
            </div>`;
          productGrid.appendChild(card);
        });
        document.querySelectorAll('.add-to-cart-btn').forEach(b => b.addEventListener('click', e=>{ e.stopPropagation(); handleAdd(b.dataset.id); }));
      }

      function handleAdd(pid) {
        if(cart.length && cartAgentId && cartAgentId!==selectedAgentId) {
          showConflict(`存在历史跨客服缓存，新增将全量重载，确认继续？`, ()=>{ clearCart(); cartAgentId=selectedAgentId; addToCart(pid); });
        } else {
          if(!cart.length) cartAgentId=selectedAgentId;
          addToCart(pid);
        }
      }
      
      function addToCart(pid) {
        const ex = cart.find(i=>i.id===pid);
        if(ex) ex.qty++; else cart.push({id:pid,qty:1});
        showToast('⚙️ 分配成功，已注入待载入单'); updateCartUI(); renderProducts();
      }
      
      function removeItem(pid) { cart=cart.filter(i=>i.id!==pid); if(!cart.length) cartAgentId=null; updateCartUI(); renderProducts(); saveCart(); }

      cartItems.addEventListener('click', e=>{
        const btn = e.target.closest('.cart-item-remove');
        if(btn) { const p = products.find(x=>x.id===btn.dataset.id); if(p && confirm(`废弃此项资产「${p.name}」？`)) { removeItem(btn.dataset.id); showToast('配置已清退'); } }
      });

      function updateCartUI() {
        const cnt = getCartCount(); cartBadge.textContent=cnt; cartBadge.classList.toggle('visible',cnt>0); cartCountLabel.textContent=cnt+'件';
        if(qrSection.classList.contains('show')) return;
        if(!cart.length) { cartItems.innerHTML='<div class="cart-empty">暂无待备资产配置</div>'; cartFooter.style.display='none'; }
        else {
          cartItems.innerHTML = cart.map(i=>{
            const p=products.find(x=>x.id===i.id); if(!p) return '';
            return `<div class="cart-item"><img class="cart-item-image" src="${p.image}"><div class="cart-item-details"><div class="cart-item-name">${p.name}</div><div class="cart-item-price">¥${p.price*i.qty}</div><div class="cart-item-qty"><button class="qty-btn" data-id="${p.id}" data-d="-1">−</button><span>${i.qty}</span><button class="qty-btn" data-id="${p.id}" data-d="1">+</button></div></div><button class="cart-item-remove" data-id="${p.id}"><i class="fa-solid fa-trash-can"></i></button></div>`;
          }).join('');
          cartFooter.style.display='block';
          const sub = getSubtotal(); cartSubtotal.textContent='¥'+sub.toFixed(2); cartTotal.textContent='¥'+sub.toFixed(2);
          cartAgentName.textContent = getAgent(cartAgentId)?.name||'未知节点';
        }
        
        document.querySelectorAll('.qty-btn').forEach(b=>b.addEventListener('click',()=>{
          const id=b.dataset.id, d=parseInt(b.dataset.d);
          const item=cart.find(i=>id===item.id); if(item){ item.qty+=d; if(item.qty<=0) cart=cart.filter(i=>i.id!==id); if(!cart.length) cartAgentId=null; updateCartUI(); renderProducts(); saveCart(); }
        }));
        saveCart();
      }

      function showQR() {
        const agent = getAgent(cartAgentId); if(!agent) return;
        let comm=0, rem=0;
        cart.forEach(i=>{ const p=products.find(x=>x.id===i.id); if(p){ const c=p.commissions?.[cartAgentId]||0; const tot=p.price*i.qty; if(p.noSecondQR){ comm+=tot; rem+=0; } else { comm+=c*i.qty; rem+=(tot-c*i.qty); } } });
        qrImage1.src=agent.paymentQR1; qrImage2.src=agent.paymentQR2;
        agentTotal.textContent=comm.toFixed(2); secondQrTotal.textContent=rem.toFixed(2);
        step2Div.style.display = rem===0?'none':'';
        cartItems.classList.add('slide-out-up'); cartFooter.style.display='none';
        cartItems.addEventListener('animationend', function h(){ cartItems.style.display='none'; qrSection.classList.add('show'); cartItems.removeEventListener('animationend',h); },{once:true});
      }
      
      function hideQR(){ qrSection.classList.remove('show'); cartItems.classList.remove('slide-out-up'); cartItems.style.display='flex'; cartFooter.style.display=cart.length?'block':'none'; updateCartUI(); }

      checkoutBtn.addEventListener('click', ()=>{ if(cart.length) showQR(); });
      $('backToCartBtn').addEventListener('click', hideQR);
      $('paidBtn').addEventListener('click', ()=>{ showToast('🔮 协议递交成功！正在为您配置'); clearCart(); hideQR(); closeCart(); });
      $('backToAgentBtn').addEventListener('click', backToAgent);

      function showConflict(msg, cb){ $('conflictMsg').textContent=msg; $('conflictModal').classList.add('open'); $('conflictConfirm').onclick=()=>{cb(); closeConflict();}; $('conflictCancel').onclick=closeConflict; }
      function closeConflict(){ $('conflictModal').classList.remove('open'); }

      function openCart(){ $('cartSidebar').classList.add('open'); $('cartOverlay').classList.add('open'); updateCartUI(); }
      function closeCart(){ $('cartSidebar').classList.remove('open'); $('cartOverlay').classList.remove('open'); }
      $('cartToggleBtn').addEventListener('click', ()=> $('cartSidebar').classList.contains('open')?closeCart():openCart());
      $('cartCloseBtn').addEventListener('click', closeCart);
      $('cartOverlay').addEventListener('click', closeCart);

      function showToast(msg){ const t=document.createElement('div'); t.className='toast'; t.textContent=msg; $('toastContainer').appendChild(t); setTimeout(()=>t.remove(),2600); }

      loadCart(); renderAgentCards();
      if(cart.length && cartAgentId) { selectedAgentId=cartAgentId; agentPage.style.display='none'; productPage.style.display='block'; renderProducts(); } else { selectedAgentId=null; }
      updateCartUI();
    })();
  </script>
</body>
</html>
