<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SansHub 商城 - 资产配置结算中心</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;800&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #000000;
      --bg-secondary: #0a0a0c;
      --bg-card: rgba(255, 255, 255, 0.02);
      --border-glow: rgba(168, 85, 247, 0.2);
      --border-glow-hover: rgba(168, 85, 247, 0.5);
      --text-primary: #e2e8f0;
      --text-secondary: #94a3b8;
      --text-muted: #475569;
      --accent-linear: linear-gradient(90deg, #a855f7, #6366f1);
      --accent-blue: linear-gradient(90deg, #3b82f6, #6366f1);
      --font-sans: 'Noto Sans SC', -apple-system, sans-serif;
      --font-display: 'Orbitron', sans-serif;
      --header-height: 72px;
      --cart-width: 420px;
      --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { 
      box-sizing: border-box; margin: 0; padding: 0; 
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none; user-select: none;
    }

    body {
      font-family: var(--font-sans); background: var(--bg-primary); color: var(--text-primary);
      line-height: 1.6; min-height: 100vh; overflow-x: hidden; padding-top: var(--header-height);
    }
    button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }

    /* ================= 顶栏 ================= */
    .header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000; height: var(--header-height);
      background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05); display: flex; align-items: center;
    }
    .header-inner { width: 100%; max-width: 1280px; margin: 0 auto; padding: 0 6%; display: flex; align-items: center; justify-content: space-between; }
    .logo {
      font-family: var(--font-display); font-size: 1.6rem; font-weight: 800;
      background: linear-gradient(45deg, #a855f7, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      letter-spacing: 1px; display: flex; align-items: center; gap: 10px;
    }
    .header-actions { display: flex; align-items: center; gap: 12px; }
    
    .nav-action-btn {
      position: relative; height: 42px; border-radius: 12px; display: flex; align-items: center; justify-content: center; 
      background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); transition: var(--transition);
    }
    .nav-action-btn:hover { 
      background: rgba(168, 85, 247, 0.08); border-color: var(--border-glow-hover); transform: translateY(-1px);
      box-shadow: 0 0 15px rgba(168, 85, 247, 0.15);
    }
    
    .cart-toggle-btn { width: 44px; }
    .home-back-btn { padding: 0 16px; gap: 8px; font-size: 0.85rem; font-weight: 700; color: var(--text-secondary); }
    .home-back-btn:hover { color: var(--text-primary); }

    .cart-badge {
      position: absolute; top: -5px; right: -5px; min-width: 18px; height: 18px; padding: 0 5px; border-radius: 50%;
      background: #a855f7; color: #ffffff; font-size: 0.7rem; font-weight: 700; display: flex; align-items: center; justify-content: center;
      transform: scale(0); transition: var(--transition);
    }
    .cart-badge.visible { transform: scale(1); }

    .main-content { max-width: 1280px; margin: 0 auto; padding: 40px 6% 60px; }

    /* ================= 客服&商品排版 ================= */
    .agent-page { background: var(--bg-secondary); border: 1px solid var(--border-glow); border-radius: 20px; padding: 40px 24px; text-align: center; }
    .agent-page h2 { font-size: 1.8rem; margin-bottom: 32px; }
    .agent-page h2 span { background: var(--accent-linear); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .agent-cards { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
    
    .agent-card {
      background: rgba(255, 255, 255, 0.01); border: 1px solid var(--border-glow); border-radius: 16px;
      padding: 24px 20px; width: 220px; text-align: center; cursor: pointer; transition: var(--transition);
    }
    .agent-card:hover { border-color: #a855f7; transform: translateY(-4px); }
    .agent-avatar { width: 72px; height: 72px; border-radius: 50%; overflow: hidden; margin: 0 auto 14px; border: 2px solid rgba(168, 85, 247, 0.3); }
    .agent-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .agent-name { font-weight: 700; font-size: 1.1rem; }
    .agent-qq { font-family: var(--font-display); font-size: 0.8rem; color: var(--text-muted); margin-top: 4px; }
    .agent-desc { font-size: 0.78rem; background: rgba(168, 85, 247, 0.15); color: #c084fc; padding: 2px 8px; border-radius: 20px; display: inline-block; margin-top: 10px; }

    .product-page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 30px; flex-wrap: wrap; gap: 16px; }
    .back-btn { background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.08); padding: 10px 20px; border-radius: 12px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    .back-btn:hover { color: #c084fc; border-color: var(--border-glow-hover); }
    
    .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 24px; }
    .product-card { background: var(--bg-secondary); border-radius: 16px; overflow: hidden; border: 1px solid var(--border-glow); display: flex; flex-direction: column; }
    .product-image-wrapper { width: 100%; aspect-ratio: 1/1; background: #050505; }
    .product-image { width: 100%; height: 100%; object-fit: cover; }
    .product-info { padding: 18px; flex: 1; display: flex; flex-direction: column; gap: 8px; }
    .product-name { font-weight: 700; }
    .product-price { font-family: var(--font-display); font-weight: 800; font-size: 1.35rem; background: var(--accent-blue); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    
    .add-to-cart-btn {
      width: 100%; padding: 12px; border-radius: 12px; background: var(--accent-linear); color: #ffffff; font-weight: 700;
      display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 4px 12px rgba(168, 85, 247, 0.2);
    }
    .add-to-cart-btn.in-cart { background: rgba(16, 185, 129, 0.15); border: 1px solid rgba(16, 185, 129, 0.4); color: #10b981; pointer-events: none; box-shadow: none; }

    /* ================= 侧边栏 ================= */
    .cart-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.75); z-index: 2000; opacity: 0; pointer-events: none; transition: opacity var(--transition); backdrop-filter: blur(4px); }
    .cart-overlay.open { opacity: 1; pointer-events: auto; }
    
    .cart-sidebar {
      position: fixed; top: 0; right: 0; bottom: 0; width: var(--cart-width); max-width: 92vw; background: #050507; z-index: 2001;
      display: flex; flex-direction: column; transform: translateX(110%); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); border-left: 1px solid var(--border-glow);
    }
    .cart-sidebar.open { transform: translateX(0); }
    .cart-header { display: flex; align-items: center; justify-content: space-between; padding: 24px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    #cartCloseBtn { width: 36px; height: 36px; border-radius: 8px; background: rgba(255,255,255,0.03); display: flex; align-items: center; justify-content: center; }

    .cart-items { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 14px; }
    .cart-item { display: flex; gap: 14px; padding: 12px; border-radius: 12px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.04); align-items: center; }
    .cart-item-image { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; }
    .cart-item-details { flex: 1; }
    .cart-item-qty { display: flex; align-items: center; gap: 10px; margin-top: 6px; }
    .qty-btn { width: 24px; height: 24px; border-radius: 6px; background: rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; }
    .cart-item-remove { color: var(--text-muted); padding: 8px; margin-left: auto; }
    .cart-item-remove:hover { color: #e74c3c; }

    /* ================= 支付二维码区域 ================= */
    .qr-section { display: none; flex: 1; overflow-y: auto; flex-direction: column; align-items: center; justify-content: center; padding: 24px; gap: 24px; }
    .qr-section.show { display: flex; }
    .qr-container { background: rgba(255,255,255,0.01); border: 1px solid var(--border-glow); padding: 20px; border-radius: 16px; width: 100%; max-width: 280px; text-align: center; }
    .qr-container img { width: 100%; max-width: 180px; aspect-ratio:1/1; border-radius: 12px; border: 2px solid #a855f7; margin: 10px auto; display: block; }
    .qr-buttons { display: flex; flex-direction: column; width: 100%; max-width: 280px; gap: 10px; }
    
    .btn { padding: 12px; border-radius: 12px; font-weight: 700; font-size: 0.9rem; text-align: center; width: 100%; }
    .btn-primary { background: var(--accent-linear); color: #ffffff; }
    .btn-secondary { background: rgba(255,255,255,0.04); color: var(--text-secondary); border: 1px solid rgba(255,255,255,0.08); }

    .cart-footer { border-top: 1px solid rgba(255,255,255,0.05); padding: 20px 24px 24px; background: #070709; }
    .cart-footer-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.9rem; }
    .cart-footer-row.total { font-size: 1.1rem; color: #a855f7; font-weight: 700; border-top: 1px solid rgba(255,255,255,0.03); padding-top: 8px; }
    .checkout-btn { width: 100%; padding: 14px; border-radius: 12px; background: var(--accent-linear); color: #ffffff; font-weight: 700; margin-top: 12px; }

    /* ================= 提示弹窗 ================= */
    .toast-container { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 3000; }
    .toast { background: linear-gradient(90deg, #a855f7, #6366f1); color: #ffffff; padding: 12px 28px; border-radius: 30px; font-weight: 700; font-size: 0.9rem; box-shadow: 0 4px 20px rgba(168, 85, 247, 0.4); }
    
    .modal-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.85); z-index: 2500; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity var(--transition); }
    .modal-overlay.open { opacity: 1; pointer-events: auto; }
    .modal { background: #0a0a0c; border-radius: 20px; padding: 32px; max-width: 90%; width: 400px; border: 1px solid #a855f7; text-align: center; }
    .modal-btns { display: flex; gap: 12px; margin-top: 24px; }

    @media (max-width: 992px) {
      .main-content { padding: 24px 4%; }
      .agent-cards { gap: 14px; }
      .agent-card { width: 46%; min-width: 140px; padding: 16px 10px; }
      .product-grid { grid-template-columns: repeat(2, 1fr); gap: 14px; }
      .home-back-btn span { display: none; }
      .home-back-btn { padding: 0 12px; }
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <div class="logo"><span><i class="fa-solid fa-store" style="margin-right:6px;"></i> SansHub</span>商城</div>
      <div class="header-actions">
        <button class="nav-action-btn home-back-btn" id="homeBackBtn">
          <i class="fa-solid fa-house"></i>
          <span>返回首页</span>
        </button>
        <button class="nav-action-btn cart-toggle-btn" id="cartToggleBtn">
          <i class="fa-solid fa-bag-shopping"></i>
          <span class="cart-badge" id="cartBadge">0</span>
        </button>
      </div>
    </div>
  </header>

  <main class="main-content">
    <div id="agentPage" class="agent-page">
      <h2>👥 选择 <span>专属服务客服</span></h2>
      <div class="agent-cards" id="agentCards"></div>
    </div>

    <div id="productPage" style="display:none;">
      <div class="product-page-header">
        <button class="back-btn" id="backToAgentBtn"><i class="fa-solid fa-arrow-left"></i> 返回客服</button>
        <h2 id="productPageTitle">配置列表</h2>
        <span id="resultsCount"></span>
      </div>
      <div class="product-grid" id="productGrid"></div>
    </div>
  </main>

  <div class="cart-overlay" id="cartOverlay"></div>
  <aside class="cart-sidebar" id="cartSidebar">
    <div class="cart-header">
      <h3>🛒 核心载入单 <span id="cartCountLabel">0件</span></h3>
      <button id="cartCloseBtn"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="cart-items" id="cartItems"></div>
    
    <div class="qr-section" id="qrSection">
      <div id="step1" class="qr-container">
        <h4>步骤 1：交付佣金</h4><img id="qrImage1"><p>¥<span id="agentTotal">0.00</span></p>
      </div>
      <div id="step2" class="qr-container">
        <h4>步骤 2：给SansHub公款打入</h4><img id="qrImage2"><p>¥<span id="secondQrTotal">0.00</span></p>
      </div>
      <div class="qr-buttons">
        <button class="btn btn-secondary" id="backToCartBtn">返回修改</button>
        <button class="btn btn-primary" id="paidBtn">完成支付后去找客服给付款凭证</button>
      </div>
    </div>
    
    <div class="cart-footer" id="cartFooter" style="display:none;">
      <div class="cart-footer-row"><span>分发对接人</span><span id="cartAgentName">-</span></div>
      <div class="cart-footer-row total"><span>核计总结算</span><span id="cartTotal">¥0</span></div>
      <button class="checkout-btn" id="checkoutBtn">💳 生成结算协议</button>
    </div>
  </aside>

  <div class="modal-overlay" id="conflictModal">
    <div class="modal">
      <h2>⚠️ 检测到调度变动</h2><p id="conflictMsg"></p>
      <div class="modal-btns">
        <button class="btn btn-secondary" id="conflictCancel">撤销</button>
        <button class="btn btn-primary" id="conflictConfirm">同步覆盖</button>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script>
    // ======================= 🔐 防审查核心机制 =======================
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('keydown', e => {
      if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) || (e.ctrlKey && (e.key === 'U' || e.key === 's'))) e.preventDefault();
    });

    // ======================= 🛒 商城控制业务层 =======================
    (function() {
      // 🎯 直接定向到大本营主站链接
      document.getElementById('homeBackBtn').addEventListener('click', () => {
        window.location.href = 'https://awa123mixue.github.io/SansHub/'; 
      });

      const agents = [
        { id: 'agent1', name: '枫洛', qq: '2984967309', avatar: 'https://q1.qlogo.cn/g?b=qq&nk=2984967309&s=100', paymentQR1: 'https://i.postimg.cc/X7qQKKxR/Screenshot-2026-04-12-21-53-38-311-com-tencent-mm.jpg', paymentQR2: 'https://i.postimg.cc/bvTsTVb0/QQ20260708-173514.png', desc: '无敌的神' },
        { id: 'agent2', name: 'thrcvb', qq: '3429983254', avatar: 'https://q1.qlogo.cn/g?b=qq&nk=3429983254&s=100', paymentQR1: 'https://i.postimg.cc/k5zXfrGL/QQ20260708-173826.png', paymentQR2: 'https://i.postimg.cc/bvTsTVb0/QQ20260708-173514.png', desc: '乐乐' },
        { id: 'agent3', name: '红温狗', qq: '2304738737', avatar: 'https://q1.qlogo.cn/g?b=qq&nk=2304738737&s=100', paymentQR1: 'https://i.postimg.cc/B6jPncLg/QQ20260708-173529.png', paymentQR2: 'https://i.postimg.cc/bvTsTVb0/QQ20260708-173514.png', desc: '乐乐' }
      ];
      
      const products = [
        { id:'p1', name:'SansHub激活卡 [ 永久卡密 ]', price:50, commissions:{agent1:10,agent2:10,agent3:5}, image:'https://picsum.photos/seed/sanshub1/500/500' },
        { id:'p2', name:'SansHub售后服务 [ 扩容账户 ]', price:20, commissions:{agent1:10,agent2:10,agent3:5}, image:'https://picsum.photos/seed/sanshub2/500/500' },
        { id:'p3', name:'SansHub售后服务 [ 变更账户 ]', price:3, commissions:{agent1:3,agent2:3,agent3:3}, noSecondQR:true, image:'https://picsum.photos/seed/sanshub3/500/500' },
        { id:'p4', name:'SansHub社区产品 [ 10连抽特权 ]', price:10, agentId:'agent1', commissions:{agent1:10}, noSecondQR:true, image:'https://picsum.photos/seed/sanshub4/500/500' }
      ];

      let selectedAgentId = null, cart = [], cartAgentId = null;
      const $ = id => document.getElementById(id);

      function saveCart() { localStorage.setItem('shop_cart_v3', JSON.stringify({cart,agentId:cartAgentId})); }
      function loadCart() { try { const d = JSON.parse(localStorage.getItem('shop_cart_v3')); if(d&&Array.isArray(d.cart)){ cart=d.cart; cartAgentId=d.agentId; } } catch(e){} }
      function getCartCount() { return cart.reduce((s,i)=>s+i.qty,0); }
      function getSubtotal() { return cart.reduce((s,i)=>{ const p=products.find(x=>x.id===i.id); return s+(p?p.price*i.qty:0); },0); }

      function renderAgentCards() {
        $('agentCards').innerHTML = agents.map(a => `<div class="agent-card" data-id="${a.id}"><div class="agent-avatar"><img src="${a.avatar}"></div><div class="agent-name">${a.name}</div><div class="agent-qq">QQ: ${a.qq}</div><div class="agent-desc">${a.desc}</div></div>`).join('');
        document.querySelectorAll('.agent-card').forEach(c => c.addEventListener('click', ()=>{
          const id = c.dataset.id;
          if(cart.length && cartAgentId && cartAgentId!==id) {
            showConflict(`更换对接客服将清除现有购物单，是否重置？`, ()=>{ cart=[]; cartAgentId=null; selectAgent(id); });
          } else selectAgent(id);
        }));
      }

      function selectAgent(id) { selectedAgentId = id; $('agentPage').style.display='none'; $('productPage').style.display='block'; if(!cart.length) cartAgentId=id; renderProducts(); updateCartUI(); }
      function renderProducts() {
        const list = products.filter(p => !p.agentId || p.agentId === selectedAgentId);
        $('productGrid').innerHTML = '';
        list.forEach(p => {
          const inCart = cart.find(i=>i.id===p.id);
          const card = document.createElement('div'); card.className='product-card';
          card.innerHTML = `<div class="product-image-wrapper"><img class="product-image" src="${p.image}"></div><div class="product-info"><span class="product-name">${p.name}</span><span class="product-price">¥${p.price}</span><button class="add-to-cart-btn ${inCart?'in-cart':''}" data-id="${p.id}"><i class="fa-solid ${inCart?'fa-circle-check':'fa-square-plus'}"></i> ${inCart?'已加入':'加入清单'}</button></div>`;
          $('productGrid').appendChild(card);
        });
        document.querySelectorAll('.add-to-cart-btn').forEach(b => b.addEventListener('click', ()=> { const pid=b.dataset.id; if(!cart.length) cartAgentId=selectedAgentId; const ex=cart.find(i=>i.id===pid); if(ex) ex.qty++; else cart.push({id:pid,qty:1}); updateCartUI(); renderProducts(); }));
      }

      function updateCartUI() {
        const cnt = getCartCount(); $('cartBadge').textContent=cnt; $('cartBadge').classList.toggle('visible',cnt>0); $('cartCountLabel').textContent=cnt+'件';
        if($('qrSection').classList.contains('show')) return;
        if(!cart.length) { $('cartItems').innerHTML='<div style="text-align:center;color:#475569;padding:40px 0;">清单暂空</div>'; $('cartFooter').style.display='none'; }
        else {
          $('cartItems').innerHTML = cart.map(i=>{ const p=products.find(x=>x.id===i.id); return `<div class="cart-item"><img class="cart-item-image" src="${p.image}"><div class="cart-item-details"><div>${p.name}</div><div style="color:#a855f7;">¥${p.price*i.qty}</div><div class="cart-item-qty"><button class="qty-btn" data-id="${p.id}" data-d="-1">-</button><span>${i.qty}</span><button class="qty-btn" data-id="${p.id}" data-d="1">+</button></div></div><button class="cart-item-remove" data-id="${p.id}"><i class="fa-solid fa-trash-can"></i></button></div>`; }).join('');
          $('cartFooter').style.display='block'; const sub=getSubtotal(); $('cartTotal').textContent='¥'+sub.toFixed(2); $('cartAgentName').textContent=agents.find(a=>a.id===cartAgentId)?.name||'-';
        }
        document.querySelectorAll('.qty-btn').forEach(b=>b.addEventListener('click',()=>{ const id=b.dataset.id, d=parseInt(b.dataset.d); const item=cart.find(i=>i.id===id); if(item){ item.qty+=d; if(item.qty<=0) cart=cart.filter(i=>i.id!==id); if(!cart.length) cartAgentId=null; updateCartUI(); renderProducts(); saveCart(); } }));
        document.querySelectorAll('.cart-item-remove').forEach(b=>b.addEventListener('click', ()=>{ cart=cart.filter(i=>i.id!==b.dataset.id); if(!cart.length) cartAgentId=null; updateCartUI(); renderProducts(); saveCart(); }));
        saveCart();
      }

      $('checkoutBtn').addEventListener('click', ()=>{
        const agent = agents.find(a=>a.id===cartAgentId); if(!agent) return;
        let comm=0, rem=0;
        cart.forEach(i=>{ const p=products.find(x=>x.id===i.id); if(p){ const c=p.commissions?.[cartAgentId]||0; if(p.noSecondQR){ comm+=(p.price*i.qty); } else { comm+=(c*i.qty); rem+=(p.price*i.qty - c*i.qty); } } });
        $('qrImage1').src=agent.paymentQR1; $('qrImage2').src=agent.paymentQR2; $('agentTotal').textContent=comm.toFixed(2); $('secondQrTotal').textContent=rem.toFixed(2);
        $('step2').style.display = rem===0?'none':''; $('cartItems').style.display='none'; $('cartFooter').style.display='none'; $('qrSection').classList.add('show');
      });

      $('backToCartBtn').addEventListener('click', ()=>{ $('qrSection').classList.remove('show'); $('cartItems').style.display='flex'; $('cartFooter').style.display='block'; updateCartUI(); });
      $('paidBtn').addEventListener('click', ()=>{ const t=document.createElement('div'); t.className='toast'; t.textContent='🔮 协议递交成功！'; $('toastContainer').appendChild(t); setTimeout(()=>t.remove(),2000); cart=[]; cartAgentId=null; saveCart(); $('qrSection').classList.remove('show'); $('cartItems').style.display='flex'; updateCartUI(); renderProducts(); $('cartSidebar').classList.remove('open'); $('cartOverlay').classList.remove('open'); });
      $('backToAgentBtn').addEventListener('click', ()=>{ $('agentPage').style.display='block'; $('productPage').style.display='none'; selectedAgentId=null; });
      
      function showConflict(msg, cb){ $('conflictMsg').textContent=msg; $('conflictModal').classList.add('open'); $('conflictConfirm').onclick=()=>{cb(); $('conflictModal').classList.remove('open');}; $('conflictCancel').onclick=()=>$('conflictModal').classList.remove('open'); }
      $('cartToggleBtn').addEventListener('click', ()=>{ $('cartSidebar').classList.toggle('open'); $('cartOverlay').classList.toggle('open'); });
      $('cartCloseBtn').addEventListener('click', ()=>{ $('cartSidebar').classList.remove('open'); $('cartOverlay').classList.remove('open'); });

      loadCart(); renderAgentCards();
      if(cart.length && cartAgentId) { selectedAgentId=cartAgentId; $('agentPage').style.display='none'; $('productPage').style.display='block'; renderProducts(); }
      updateCartUI();
    })();
  </script>
</body>
</html>
