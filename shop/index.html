<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ 雅致商店 | Modern Shop</title>

    <!-- Font Awesome 图标库 (CDN) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-primary: #fafaf8;
            --bg-secondary: #ffffff;
            --bg-tertiary: #f3f2ef;
            --text-primary: #1a1a1a;
            --text-secondary: #5c5c5c;
            --text-muted: #999999;
            --accent: #c84c3c;
            --accent-hover: #b03a2b;
            --accent-light: #fdf0ee;
            --gold: #c8963e;
            --gold-light: #fdf6ed;
            --border: #e8e6e1;
            --border-light: #f0efeb;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.06), 0 2px 6px rgba(0, 0, 0, 0.04);
            --shadow-lg: 0 12px 40px rgba(0, 0, 0, 0.1), 0 4px 12px rgba(0, 0, 0, 0.05);
            --shadow-xl: 0 24px 60px rgba(0, 0, 0, 0.14), 0 8px 20px rgba(0, 0, 0, 0.06);
            --radius-sm: 8px;
            --radius: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --transition-fast: 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-slow: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --font-display: 'Playfair Display', Georgia, 'Times New Roman', serif;
            --header-height: 72px;
            --cart-width: 420px;
            --max-width: 1280px;
        }

        /* ============ RESET & BASE ============ */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
            padding-top: var(--header-height);
        }

        a {
            text-decoration: none;
            color: inherit;
        }
        ul {
            list-style: none;
        }
        img {
            display: block;
            max-width: 100%;
            height: auto;
        }
        button {
            font-family: inherit;
            cursor: pointer;
            border: none;
            background: none;
            font-size: inherit;
            color: inherit;
        }
        input {
            font-family: inherit;
            font-size: inherit;
            border: none;
            outline: none;
            background: none;
        }

        /* ============ HEADER / NAVBAR ============ */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            height: var(--header-height);
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-light);
            transition: var(--transition);
            display: flex;
            align-items: center;
        }
        .header.scrolled {
            box-shadow: var(--shadow-md);
            background: rgba(255, 255, 255, 0.95);
        }
        .header-inner {
            width: 100%;
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
        }
        .logo {
            font-family: var(--font-display);
            font-size: 1.65rem;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.02em;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }
        .logo-icon {
            width: 38px;
            height: 38px;
            background: var(--accent);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 1.1rem;
        }
        .nav-links {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .nav-link {
            padding: 8px 16px;
            border-radius: 24px;
            font-weight: 500;
            font-size: 0.9rem;
            color: var(--text-secondary);
            transition: var(--transition-fast);
            white-space: nowrap;
        }
        .nav-link:hover,
        .nav-link.active {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }
        .nav-link.active {
            font-weight: 600;
            background: var(--accent-light);
            color: var(--accent);
        }
        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }
        .search-toggle-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition-fast);
            color: var(--text-secondary);
            font-size: 1.1rem;
        }
        .search-toggle-btn:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }
        .cart-toggle-btn {
            position: relative;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-tertiary);
            transition: var(--transition-fast);
            font-size: 1.2rem;
            color: var(--text-primary);
        }
        .cart-toggle-btn:hover {
            background: #e8e5df;
            transform: scale(1.05);
        }
        .cart-badge {
            position: absolute;
            top: 2px;
            right: 2px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--accent);
            color: #fff;
            font-size: 0.7rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            transform: scale(0);
            pointer-events: none;
        }
        .cart-badge.visible {
            transform: scale(1);
            animation: badgePop 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes badgePop {
            0% {
                transform: scale(0);
            }
            60% {
                transform: scale(1.35);
            }
            100% {
                transform: scale(1);
            }
        }
        /* 汉堡菜单 (移动端) */
        .hamburger {
            display: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 5px;
            background: var(--bg-tertiary);
            transition: var(--transition-fast);
            z-index: 1001;
        }
        .hamburger span {
            display: block;
            width: 18px;
            height: 2px;
            background: var(--text-primary);
            border-radius: 2px;
            transition: var(--transition);
        }
        .hamburger.open span:nth-child(1) {
            transform: translateY(7px) rotate(45deg);
        }
        .hamburger.open span:nth-child(2) {
            opacity: 0;
            transform: scaleX(0);
        }
        .hamburger.open span:nth-child(3) {
            transform: translateY(-7px) rotate(-45deg);
        }

        /* ============ SEARCH OVERLAY ============ */
        .search-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 999;
            background: rgba(255, 255, 255, 0.97);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 20px 24px;
            display: flex;
            align-items: center;
            gap: 14px;
            transform: translateY(-110%);
            transition: var(--transition-slow);
            box-shadow: var(--shadow-lg);
            height: var(--header-height);
        }
        .search-overlay.open {
            transform: translateY(0);
        }
        .search-overlay input {
            flex: 1;
            font-size: 1.1rem;
            padding: 10px 0;
            border-bottom: 2px solid var(--border);
            transition: var(--transition);
            color: var(--text-primary);
            background: transparent;
        }
        .search-overlay input:focus {
            border-bottom-color: var(--accent);
        }
        .search-overlay input::placeholder {
            color: var(--text-muted);
        }
        .search-close-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: var(--bg-tertiary);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition-fast);
            flex-shrink: 0;
        }
        .search-close-btn:hover {
            background: #e0ddd6;
        }

        /* ============ MAIN CONTENT ============ */
        .main-content {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 28px 24px 60px;
        }

        /* Hero Banner */
        .hero-banner {
            background: linear-gradient(135deg, #2c2420 0%, #3d302b 30%, #4a372e 60%, #2c2420 100%);
            border-radius: var(--radius-xl);
            padding: 48px 40px;
            margin-bottom: 36px;
            color: #fff;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 30px;
        }
        .hero-banner::before {
            content: '';
            position: absolute;
            top: -60px;
            right: -40px;
            width: 280px;
            height: 280px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.03);
            pointer-events: none;
        }
        .hero-banner::after {
            content: '';
            position: absolute;
            bottom: -40px;
            left: 30%;
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.025);
            pointer-events: none;
        }
        .hero-text {
            position: relative;
            z-index: 1;
            flex: 1;
            min-width: 200px;
        }
        .hero-badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.15);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-bottom: 16px;
        }
        .hero-title {
            font-family: var(--font-display);
            font-size: clamp(1.8rem, 3.5vw, 2.6rem);
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 12px;
            letter-spacing: -0.02em;
        }
        .hero-subtitle {
            font-size: 1rem;
            opacity: 0.8;
            line-height: 1.5;
            max-width: 420px;
        }
        .hero-cta {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 28px;
            background: #fff;
            color: #2c2420;
            border-radius: 28px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: var(--transition);
            letter-spacing: -0.01em;
        }
        .hero-cta:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
        }
        .hero-visual {
            position: relative;
            z-index: 1;
            flex-shrink: 0;
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            border: 3px dashed rgba(255, 255, 255, 0.2);
        }

        /* Category Pills */
        .category-pills {
            display: flex;
            gap: 10px;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }
        .category-pill {
            padding: 10px 20px;
            border-radius: 24px;
            font-weight: 500;
            font-size: 0.88rem;
            background: var(--bg-secondary);
            border: 1.5px solid var(--border);
            color: var(--text-secondary);
            transition: var(--transition-fast);
            white-space: nowrap;
            cursor: pointer;
        }
        .category-pill:hover {
            border-color: #ccc;
            color: var(--text-primary);
            background: var(--bg-tertiary);
        }
        .category-pill.active {
            background: var(--text-primary);
            color: #fff;
            border-color: var(--text-primary);
        }

        /* Section Header */
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .section-title {
            font-family: var(--font-display);
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.02em;
        }
        .results-count {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* Product Grid */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
        }
        .product-card {
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            overflow: hidden;
            border: 1px solid var(--border-light);
            transition: var(--transition);
            position: relative;
            display: flex;
            flex-direction: column;
            cursor: pointer;
        }
        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
            border-color: transparent;
        }
        .product-image-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1;
            overflow: hidden;
            background: #f5f4f1;
        }
        .product-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: var(--transition-slow);
        }
        .product-card:hover .product-image {
            transform: scale(1.06);
        }
        .product-tag {
            position: absolute;
            top: 12px;
            left: 12px;
            padding: 5px 12px;
            border-radius: 16px;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            z-index: 2;
        }
        .tag-sale {
            background: var(--accent);
            color: #fff;
        }
        .tag-new {
            background: #3a7d44;
            color: #fff;
        }
        .tag-best {
            background: var(--gold);
            color: #fff;
        }
        .product-actions-overlay {
            position: absolute;
            bottom: 10px;
            right: 10px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            z-index: 2;
            opacity: 0;
            transform: translateX(10px);
            transition: var(--transition);
        }
        .product-card:hover .product-actions-overlay {
            opacity: 1;
            transform: translateX(0);
        }
        .action-icon-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #fff;
            box-shadow: var(--shadow-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            color: var(--text-primary);
            transition: var(--transition-fast);
        }
        .action-icon-btn:hover {
            background: var(--accent);
            color: #fff;
            box-shadow: var(--shadow-lg);
        }
        .product-info {
            padding: 16px 18px 18px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .product-category-label {
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            font-weight: 500;
        }
        .product-name {
            font-weight: 600;
            font-size: 1rem;
            line-height: 1.35;
            color: var(--text-primary);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .product-rating {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.78rem;
            color: var(--gold);
        }
        .product-rating span {
            color: var(--text-muted);
            margin-left: 4px;
            font-size: 0.75rem;
        }
        .product-price-row {
            display: flex;
            align-items: baseline;
            gap: 8px;
            margin-top: 2px;
        }
        .product-price {
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--text-primary);
            letter-spacing: -0.02em;
        }
        .product-price-original {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-decoration: line-through;
            font-weight: 400;
        }
        .add-to-cart-btn {
            margin-top: 10px;
            width: 100%;
            padding: 11px;
            border-radius: var(--radius);
            background: var(--text-primary);
            color: #fff;
            font-weight: 600;
            font-size: 0.9rem;
            transition: var(--transition-fast);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            letter-spacing: -0.01em;
        }
        .add-to-cart-btn:hover {
            background: #333;
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }
        .add-to-cart-btn:active {
            transform: scale(0.97);
            transition: 0.08s;
        }
        .add-to-cart-btn.in-cart {
            background: #3a7d44;
            pointer-events: none;
        }
        .add-to-cart-btn.in-cart::after {
            content: ' ✓';
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            grid-column: 1 / -1;
        }
        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 16px;
            opacity: 0.5;
        }
        .empty-state h3 {
            font-family: var(--font-display);
            font-size: 1.4rem;
            margin-bottom: 8px;
        }
        .empty-state p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        /* ============ CART SIDEBAR ============ */
        .cart-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: opacity var(--transition);
        }
        .cart-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }
        .cart-sidebar {
            position: fixed;
            top: 0;
            right: 0;
            bottom: 0;
            width: var(--cart-width);
            max-width: 92vw;
            background: #fff;
            z-index: 2001;
            display: flex;
            flex-direction: column;
            transform: translateX(110%);
            transition: transform var(--transition-slow);
            box-shadow: var(--shadow-xl);
        }
        .cart-sidebar.open {
            transform: translateX(0);
        }
        .cart-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 24px;
            border-bottom: 1px solid var(--border-light);
            flex-shrink: 0;
        }
        .cart-header h3 {
            font-family: var(--font-display);
            font-size: 1.3rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .cart-header h3 .count {
            font-family: var(--font-sans);
            font-size: 0.8rem;
            font-weight: 500;
            background: var(--bg-tertiary);
            padding: 3px 10px;
            border-radius: 12px;
            color: var(--text-secondary);
        }
        .cart-close-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition-fast);
            font-size: 1.1rem;
            color: var(--text-secondary);
        }
        .cart-close-btn:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }
        .cart-items {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .cart-item {
            display: flex;
            gap: 14px;
            padding: 10px;
            border-radius: var(--radius);
            transition: var(--transition-fast);
            background: #fafaf9;
            align-items: center;
        }
        .cart-item:hover {
            background: #f5f4f1;
        }
        .cart-item-image {
            width: 64px;
            height: 64px;
            border-radius: var(--radius-sm);
            object-fit: cover;
            flex-shrink: 0;
            background: #eee;
        }
        .cart-item-details {
            flex: 1;
            min-width: 0;
        }
        .cart-item-name {
            font-weight: 600;
            font-size: 0.9rem;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .cart-item-price {
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--text-primary);
        }
        .cart-item-qty {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 4px;
        }
        .qty-btn {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: #fff;
            border: 1.5px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            transition: var(--transition-fast);
            font-weight: 600;
            color: var(--text-primary);
        }
        .qty-btn:hover {
            border-color: var(--text-primary);
            background: var(--bg-tertiary);
        }
        .qty-value {
            font-weight: 600;
            font-size: 0.9rem;
            min-width: 24px;
            text-align: center;
        }
        .cart-item-remove {
            color: #c0bdb6;
            font-size: 0.85rem;
            padding: 6px;
            border-radius: 50%;
            transition: var(--transition-fast);
            flex-shrink: 0;
        }
        .cart-item-remove:hover {
            color: var(--accent);
            background: var(--accent-light);
        }
        .cart-empty {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;

                  <img
                    class="product-image"
                    src="${product.image}"
                    alt="${product.name}"
                    loading="lazy"
                    onerror="this.onerror=null;this.src='${product._fallbackImage}';this.onerror=function(){this.style.background='#e8e5df';this.style.minHeight='200px';};"
                  >
                  <div class="product-actions-overlay">
                    <button class="action-icon-btn quick-view-btn" data-id="${product.id}" aria-label="快速查看" title="快速查看">
                      <i class="fa-solid fa-eye"></i>
                    </button>
                    <button class="action-icon-btn wishlist-btn" data-id="${product.id}" aria-label="加入收藏" title="加入收藏">
                      <i class="fa-regular fa-heart"></i>
                    </button>
                  </div>
                </div>
                <div class="product-info">
                  <span class="product-category-label">${getCategoryLabel(product.category)}</span>
                  <span class="product-name">${product.name}</span>
                  <div class="product-rating">
                    ${starsHTML}
                    <span>(${product.reviews.toLocaleString()})</span>
                  </div>
                  <div class="product-price-row">
                    <span class="product-price">¥${product.price}</span>
                    ${product.originalPrice ? `<span class="product-price-original">¥${product.originalPrice}</span>` : ''}
                  </div>
                  <button class="add-to-cart-btn ${inCartQty > 0 ? 'in-cart' : ''}" data-id="${product.id}">
                    <i class="fa-solid fa-cart-plus"></i>
                    ${inCartQty > 0 ? '已添加' : '加入购物车'}
                  </button>
                </div>
              `;
                    productGrid.appendChild(card);
                });

                // 绑定事件
                document.querySelectorAll('.add-to-cart-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const id = parseInt(btn.dataset.id);
                        addToCart(id);
                    });
                });
                document.querySelectorAll('.quick-view-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const id = parseInt(btn.dataset.id);
                        showQuickView(id);
                    });
                });
                document.querySelectorAll('.wishlist-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const icon = btn.querySelector('i');
                        if (icon.classList.contains('fa-regular')) {
                            icon.classList.remove('fa-regular');
                            icon.classList.add('fa-solid');
                            icon.style.color = '#e74c3c';
                            showToast('💖 已加入收藏');
                        } else {
                            icon.classList.remove('fa-solid');
                            icon.classList.add('fa-regular');
                            icon.style.color = '';
                            showToast('已取消收藏');
                        }
                    });
                });
                document.querySelectorAll('.product-card').forEach(card => {
                    card.addEventListener('click', function(e) {
                        // 如果点击的是按钮，不触发卡片点击
                        if (e.target.closest('button')) return;
                        const btn = card.querySelector('.quick-view-btn');
                        if (btn) {
                            const id = parseInt(btn.dataset.id);
                            showQuickView(id);
                        }
                    });
                });
            }

            function generateStars(rating) {
                const fullStars = Math.floor(rating);
                const hasHalf = rating - fullStars >= 0.4;
                let html = '';
                for (let i = 0; i < fullStars; i++) {
                    html += '<i class="fa-solid fa-star"></i>';
                }
                if (hasHalf) {
                    html += '<i class="fa-solid fa-star-half-stroke"></i>';
                }
                const emptyStars = 5 - fullStars - (hasHalf ? 1 : 0);
                for (let i = 0; i < emptyStars; i++) {
                    html += '<i class="fa-regular fa-star"></i>';
                }
                return html;
            }

            function getCategoryLabel(category) {
                const map = {
                    'electronics': '电子产品',
                    'clothing': '服装',
                    'home': '家居生活',
                    'sports': '运动户外',
                };
                return map[category] || category;
            }

            function renderCart() {
                const count = getCartCount();
                // 更新徽章
                cartBadge.textContent = count;
                if (count > 0) {
                    cartBadge.classList.add('visible');
                } else {
                    cartBadge.classList.remove('visible');
                }
                cartCountLabel.textContent = count + ' 件';

                // 更新购物车内容
                if (cart.length === 0) {
                    cartItemsContainer.innerHTML = `
                <div class="cart-empty" id="cartEmpty">
                  <div class="cart-empty-icon">🛒</div>
                  <p>购物车空空如也</p>
                  <p style="font-size:0.8rem;color:#bbb;">快去挑选心仪的商品吧~</p>
                </div>`;
                    cartFooter.style.display = 'none';
                } else {
                    cartItemsContainer.innerHTML = '';
                    cart.forEach(item => {
                        const product = products.find(p => p.id === item.id);
                        if (!product) return;
                        const itemEl = document.createElement('div');
                        itemEl.className = 'cart-item';
                        itemEl.innerHTML = `
                  <img class="cart-item-image" src="${product.image}" alt="${product.name}" loading="lazy"
                       onerror="this.onerror=null;this.src='${product._fallbackImage}';">
                  <div class="cart-item-details">
                    <span class="cart-item-name">${product.name}</span>
                    <span class="cart-item-price">¥${(product.price * item.qty).toLocaleString()}</span>
                    <div class="cart-item-qty">
                      <button class="qty-btn cart-qty-minus" data-id="${product.id}">−</button>
                      <span class="qty-value">${item.qty}</span>
                      <button class="qty-btn cart-qty-plus" data-id="${product.id}">+</button>
                    </div>
                  </div>
                  <button class="cart-item-remove" data-id="${product.id}" aria-label="移除商品" title="移除">
                    <i class="fa-solid fa-trash-can"></i>
                  </button>
                `;
                        cartItemsContainer.appendChild(itemEl);
                    });
                    cartFooter.style.display = 'block';
                }

                // 更新金额
                const subtotal = getCartSubtotal();
                const total = getCartTotal();
                cartSubtotal.textContent = '¥' + subtotal.toLocaleString(undefined, { minimumFractionDigits: 2,
                    maximumFractionDigits: 2 });
                cartTotal.textContent = '¥' + total.toLocaleString(undefined, { minimumFractionDigits: 2,
                    maximumFractionDigits: 2 });
                if (promoDiscount > 0) {
                    cartShipping.textContent = '免运费 · 已享' + Math.round(promoDiscount * 100) + '%折扣';
                    cartShipping.style.color = '#3a7d44';
                } else if (subtotal >= 299) {
                    cartShipping.textContent = '免运费';
                    cartShipping.style.color = '#3a7d44';
                } else {
                    cartShipping.textContent = '¥15.00（满¥299免运费）';
                    cartShipping.style.color = '';
                }

                // 绑定购物车内按钮事件
                document.querySelectorAll('.cart-qty-minus').forEach(btn => {
                    btn.addEventListener('click', () => updateCartItemQty(parseInt(btn.dataset.id), -1));
                });
                document.querySelectorAll('.cart-qty-plus').forEach(btn => {
                    btn.addEventListener('click', () => updateCartItemQty(parseInt(btn.dataset.id), 1));
                });
                document.querySelectorAll('.cart-item-remove').forEach(btn => {
                    btn.addEventListener('click', () => removeFromCart(parseInt(btn.dataset.id)));
                });

                saveCart();
            }

            // ============ 购物车操作 ============
            function addToCart(productId, qty = 1) {
                const existing = cart.find(item => item.id === productId);
                if (existing) {
                    existing.qty += qty;
                } else {
                    cart.push({ id: productId, qty });
                }
                const product = products.find(p => p.id === productId);
                showToast(`✅ 已添加「${product?.name || '商品'}」到购物车`);
                renderCart();
                renderProducts();
            }

            function updateCartItemQty(productId, delta) {
                const existing = cart.find(item => item.id === productId);
                if (!existing) return;
                existing.qty += delta;
                if (existing.qty <= 0) {
                    cart = cart.filter(item => item.id !== productId);
                }
                renderCart();
                renderProducts();
                saveCart();
            }

            function removeFromCart(productId) {
                const product = products.find(p => p.id === productId);
                cart = cart.filter(item => item.id !== productId);
                showToast(`🗑️ 已移除「${product?.name || '商品'}」`);
                renderCart();
                renderProducts();
                saveCart();
            }

            // ============ Toast ============
            function showToast(message) {
                const toast = document.createElement('div');
                toast.className = 'toast';
                toast.textContent = message;
                toastContainer.appendChild(toast);
                // 自动移除
                setTimeout(() => {
                    if (toast.parentNode) {
                        toast.remove();
                    }
                }, 2700);
            }

            // ============ 快速查看 ============
            function showQuickView(productId) {
                const product = products.find(p => p.id === productId);
                if (!product) return;
                // 简单实现：滚动到商品并高亮
                const cards = document.querySelectorAll('.product-card');
                cards.forEach(c => c.style.outline = 'none');
                const targetBtn = document.querySelector(`.add-to-cart-btn[data-id="${productId}"]`);
                if (targetBtn) {
                    const card = targetBtn.closest('.product-card');
                    if (card) {
                        card.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        card.style.outline = '3px solid var(--accent)';
                        card.style.outlineOffset = '4px';
                        card.style.borderRadius = 'var(--radius-lg)';
                        setTimeout(() => {
                            card.style.outline = 'none';
                            card.style.outlineOffset = '0';
                        }, 2000);
                    }
                }
                showToast(`👀 快速查看：「${product.name}」— ¥${product.price}`);
            }

            // ============ 购物车面板开关 ============
            function openCart() {
                cartSidebar.classList.add('open');
                cartOverlay.classList.add('open');
                document.body.style.overflow = 'hidden';
                renderCart();
            }

            function closeCart() {
                cartSidebar.classList.remove('open');
                cartOverlay.classList.remove('open');
                document.body.style.overflow = '';
            }

            // ============ 搜索面板 ============
            function openSearch() {
                searchOverlay.classList.add('open');
                searchInput.focus();
            }

            function closeSearch() {
                searchOverlay.classList.remove('open');
                searchInput.value = '';
                searchQuery = '';
                renderProducts();
            }

            // ============ 结账模态框 ============
            function openCheckoutModal() {
                if (cart.length === 0) return;
                const orderNum = 'ORD-' + Date.now().toString(36).toUpperCase().slice(-8);
                orderNumberSpan.textContent = orderNum;
                checkoutModalOverlay.classList.add('open');
                document.body.style.overflow = 'hidden';
                // 清空购物车
                cart = [];
                promoDiscount = 0;
                promoMsg.textContent = '';
                promoMsg.className = 'promo-msg';
                promoInput.value = '';
                saveCart();
                renderCart();
                renderProducts();
                closeCart();
            }

            function closeCheckoutModal() {
                checkoutModalOverlay.classList.remove('open');
                document.body.style.overflow = '';
            }

            // ============ 事件监听 ============
            document.getElementById('cartToggleBtn').addEventListener('click', () => {
                if (cartSidebar.classList.contains('open')) {
                    closeCart();
                } else {
                    openCart();
                }
            });
            document.getElementById('cartCloseBtn').addEventListener('click', closeCart);
            cartOverlay.addEventListener('click', closeCart);

            document.getElementById('searchToggleBtn').addEventListener('click', openSearch);
            document.getElementById('searchCloseBtn').addEventListener('click', closeSearch);
            searchInput.addEventListener('input', () => {
                searchQuery = searchInput.value.trim();
                renderProducts();
            });

            // ESC关闭
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    if (cartSidebar.classList.contains('open')) closeCart();
                    if (searchOverlay.classList.contains('open')) closeSearch();
                    if (checkoutModalOverlay.classList.contains('open')) closeCheckoutModal();
                }
            });

            // 分类筛选
            document.getElementById('categoryPills').addEventListener('click', (e) => {
                const pill = e.target.closest('.category-pill');
                if (!pill) return;
                document.querySelectorAll('.category-pill').forEach(p => p.classList.remove(
                'active'));
                pill.classList.add('active');
                activeCategory = pill.dataset.category;
                renderProducts();
                // 滚动到商品区域
                document.getElementById('products').scrollIntoView({ behavior: 'smooth' });
            });

            // 结账按钮
            document.getElementById('checkoutBtn').addEventListener('click', () => {
                if (cart.length === 0) return;
                openCheckoutModal();
            });
            document.getElementById('modalCloseBtn').addEventListener('click', closeCheckoutModal);
            checkoutModalOverlay.addEventListener('click', (e) => {
                if (e.target === checkoutModalOverlay) closeCheckoutModal();
            });

            // 优惠码
            document.getElementById('promoApplyBtn').addEventListener('click', () => {
                const code = promoInput.value.trim().toUpperCase();
                if (PROMO_CODES[code] !== undefined) {
                    promoDiscount = PROMO_CODES[code];
                    promoMsg.textContent = `✅ 优惠码已应用！享受 ${Math.round(promoDiscount * 100)}% 折扣`;
                    promoMsg.className = 'promo-msg success';
                    showToast(`🎫 优惠码「${code}」已生效`);
                } else {
                    promoDiscount = 0;
                    promoMsg.textContent = '❌ 无效的优惠码';
                    promoMsg.className = 'promo-msg error';
                }
                renderCart();
                saveCart();
            });
            promoInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    document.getElementById('promoApplyBtn').click();
                }
            });

            // 汉堡菜单
            hamburgerBtn.addEventListener('click', () => {
                const isOpen = navLinks.classList.toggle('open');
                hamburgerBtn.classList.toggle('open', isOpen);
            });
            // 点击导航链接关闭菜单
            navLinks.addEventListener('click', (e) => {
                const link = e.target.closest('.nav-link');
                if (link) {
                    navLinks.classList.remove('open');
                    hamburgerBtn.classList.remove('open');
                    // 更新active状态
                    document.querySelectorAll('.nav-link').forEach(l => l.classList.remove(
                    'active'));
                    link.classList.add('active');
                    // 处理特殊导航
                    const navType = link.dataset.nav;
                    if (navType === 'sale') {
                        activeCategory = 'all';
                        document.querySelectorAll('.category-pill').forEach(p => p.classList
                            .remove('active'));
                        const allPill = document.querySelector('.category-pill[data-category="all"]');
                        if (allPill) allPill.classList.add('active');
                        renderProducts();
                        document.getElementById('products').scrollIntoView({ behavior: 'smooth' });
                    } else if (navType === 'new') {
                        activeCategory = 'all';
                        document.querySelectorAll('.category-pill').forEach(p => p.classList
                            .remove('active'));
                        const allPill = document.querySelector('.category-pill[data-category="all"]');
                        if (allPill) allPill.classList.add('active');
                        renderProducts();
                        document.getElementById('products').scrollIntoView({ behavior: 'smooth' });
                    }
                }
            });

            // Header滚动阴影
            const header = document.getElementById('header');
            let scrollTicking = false;
            window.addEventListener('scroll', () => {
                if (!scrollTicking) {
                    requestAnimationFrame(() => {
                        if (window.scrollY > 10) {
                            header.classList.add('scrolled');
                        } else {
                            header.classList.remove('scrolled');
                        }
                        scrollTicking = false;
                    });
                    scrollTicking = true;
                }
            });

            // ============ 初始化 ============
            function init() {
                loadCart();
                renderProducts();
                renderCart();
                // 初始检查header状态
                if (window.scrollY > 10) {
                    header.classList.add('scrolled');
                }
            }

            init();

            console.log('🛍️  雅致商店已就绪 | Modern Shop Ready');
            console.log('📦  商品数量:', products.length);
            console.log('🛒  购物车商品:', getCartCount(), '件');
            console.log('💡  优惠码提示: SAVE10 (9折) | WELCOME (85折) | VIP20 (8折)');
            console.log('🚀  适配 GitHub Pages 部署 ✓');
        })();
    </script>
</body>
</html>
